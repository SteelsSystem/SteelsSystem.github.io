<style id="lf-a11y-readability">
/* ═════════════════════════════════════════════════════════════════
   LEX FORENSICA · READABILITY LAYER
   Lifts text contrast toward WCAG AA on the dark Lex Forensica palette
   while preserving blob parameters, audio/visual semantics, and hues.
   Default = brighter text + softer interference. html.lf-hc = high contrast.
   ═════════════════════════════════════════════════════════════════ */

/* 1. Brightened fusion token defaults */
:root {
  --lf-text: rgba(238,246,255,.96);
  --lf-muted: rgba(196,220,232,.85);
  --lf-text-strong: #f6faff;
  --lf-link: #6fefff;
  --lf-amber-strong: #ffd066;
  --lf-rose-strong: #ff9ec2;
  --lf-purple-strong: #b694ff;
  --lf-green-strong: #4be0b8;
  --lf-red-strong: #ff7a7a;
}

/* 2. Lift the legacy palette tokens used by index/introspect/controlroom/etc.
      These names are reused across files — overriding them here propagates. */
:root {
  --text: #e8ecf6;
  --dim:  #a9b0c4;
  --bright: #f6faff;
}

/* 3. Reduce visual interference from the lava layer so body copy reads.
      Blob shapes, animations and colors are PRESERVED — only the wrap-level
      filter strength and opacity are softened. */
.lava-wrap {
  opacity: .07 !important;
  filter: blur(80px) contrast(1.15) saturate(.9) !important;
}
/* Grain layer: keep texture but lessen veil over text */
body::after { opacity: .18 !important; }

/* 4. Body text crispness on dark backgrounds */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* 5. Lift the most common low-contrast copy selectors.
      Each rule keeps the original hue family but pushes alpha into
      a legible band (>= ~.82) on the #03070b / #05050f base. */

/* HERO + LEAD COPY */

<script id="lf-a11y-toggle-script">
(function(){
  try{
    var KEY='lf-a11y-hc';
    var html=document.documentElement;
    var stored=null;
    try{ stored=localStorage.getItem(KEY); }catch(_){}
    if(stored==='1') html.classList.add('lf-hc');
    function mkBtn(){
      if(document.getElementById('lf-a11y-toggle')) return;
      var b=document.createElement('button');
      b.id='lf-a11y-toggle';
      b.type='button';
      b.setAttribute('aria-label','Přepnout vysoký kontrast / Toggle high contrast');
      b.setAttribute('title','Vysoký kontrast / High contrast (A11Y)');
      b.innerHTML='<span class="lf-a11y-off">A++ KONTRAST</span><span class="lf-a11y-on">A− NORMÁL</span>';
      b.addEventListener('click',function(){
        var on=html.classList.toggle('lf-hc');
        try{ localStorage.setItem(KEY,on?'1':'0'); }catch(_){}
      });
      document.body.appendChild(b);
    }
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',mkBtn,{once:true});
    } else { mkBtn(); }
  }catch(_){}
})();
</script>

<script>
(function(){
  try{
    var m=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)');
    if(m&&m.matches)document.documentElement.classList.add('lf-reduced-motion');
    if(m&&m.addEventListener)m.addEventListener('change',function(e){
      document.documentElement.classList.toggle('lf-reduced-motion',e.matches);
    });
  }catch(_){}
  function applyVisibility(){
    try{
      if(!document.body)return;
      document.body.setAttribute('data-lf-paused',document.hidden?'1':'0');
    }catch(_){}
  }
  document.addEventListener('visibilitychange',applyVisibility,{passive:true});
  if(document.readyState!=='loading')applyVisibility();
  else document.addEventListener('DOMContentLoaded',applyVisibility,{once:true});
  window.LF=window.LF||{
    onIdle:function(fn){
      if('requestIdleCallback' in window)requestIdleCallback(fn,{timeout:1500});
      else setTimeout(fn,1);
    },
    defer:function(fn){
      if(document.readyState==='complete')window.LF.onIdle(fn);
      else window.addEventListener('load',function(){window.LF.onIdle(fn)},{once:true});
    },
    isHidden:function(){return document.hidden===true}
  };
})();
</script>

#timer {
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 14px;
    text-align: center;
    min-width: 120px;
}

button {
    background: #00ffaa;
    color: #000;
    border: 1px solid #00ff88;
    padding: 8px 12px;
    margin: 4px;
    cursor: pointer;
    font-weight: bold;
    font-family: monospace;
    font-size: 11px;
    transition: 0.2s ease;
    box-shadow: 0 0 10px rgba(0,255,170,0.3);
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(0,255,170,0.6);
    background: #00ffdd;
}

button.active {
    background: #ffff00;
    box-shadow: 0 0 20px rgba(255,255,0,0.8);
}

button.playing {
    background: #ff00ff;
    color: white;
    box-shadow: 0 0 20px rgba(255,0,255,0.8);
}

#fileInput {
    display: none;
}

.time-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-value {
    color: #00ffaa;
    font-weight: bold;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overlay">

    <div id="stats" class="panel">
        <strong>◆ HEXAGONAL PARADIGM ◆</strong><br>
        ━━━━━━━━━━━━━━━━━━<br>
        Mode: <span class="stat-value" id="mode">MATH</span><br>
        Status: <span class="stat-value" id="status">▶ PLAYING</span><br>
        ━━━━━━━━━━━━━━━━━━<br>
        Bass: <span class="stat-value" id="bass">0.00</span><br>
        Mid: <span class="stat-value" id="mid">0.00</span><br>
        High: <span class="stat-value" id="high">0.00</span><br>
        Energy: <span class="stat-value" id="energy">0.00</span><br>
    </div>

    <div id="controls" class="panel">
        <button id="btnUpload">📁 UPLOAD</button>
        <button id="btnMath" class="active">⚡ MATH</button>
        <button id="btnPlayPause" class="playing">⏸ PAUSE</button>
        <button id="btnStop">⏹ STOP</button>
        <button id="btnFullscreen">⛶ FULL</button>
        <br>
        <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div id="timer" class="panel">
        <div class="time-label">⏱ ELAPSED</div>
        <div id="time-display" style="font-size: 18px; font-weight: bold; margin-top: 6px;">0:00</div>
    </div>

</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cx = 0;
let cy = 0;

function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr, dpr);

    cx = window.innerWidth / 2;
    cy = window.innerHeight / 2;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let audioCtx = null;
let analyser = null;
let freqData = null;
let audioElement = null;
let source = null;
let currentObjectURL = null;

let mBass = 0;
let mMid = 0;
let mHigh = 0;
let mEnergy = 0;

let mode = 'MATH';
let isPlaying = true;
let time = 0;
let elapsedTime = 0;
let startTime = Date.now();
let isTabVisible = true;

function initAudio() {
    if (audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.88;

    freqData = new Uint8Array(analyser.frequencyBinCount);
}

initAudio();

function formatTime(ms) {
    const seconds = Math.floor(ms / 1000);
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;

    return `${minutes}:${secs.toString().padStart(2, '0')}`;
}

setInterval(() => {
    if (isPlaying) {
        elapsedTime = Date.now() - startTime;
        document.getElementById('time-display').textContent = formatTime(elapsedTime);
    }
}, 100);

async function ensureAudioRunning() {
    if (audioCtx && audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }
}

async function loadAudioFile(file) {
    await ensureAudioRunning();

    if (audioElement) {
        audioElement.pause();
    }

    if (source) {
        source.disconnect();
    }

    if (currentObjectURL) {
        URL.revokeObjectURL(currentObjectURL);
    }

    currentObjectURL = URL.createObjectURL(file);

    audioElement = new Audio(currentObjectURL);
    audioElement.crossOrigin = 'anonymous';

    source = audioCtx.createMediaElementSource(audioElement);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    await audioElement.play();

    mode = 'FILE';
    isPlaying = true;
    startTime = Date.now();
    elapsedTime = 0;

    document.getElementById('mode').textContent = 'FILE';
    document.getElementById('status').textContent = '▶ PLAYING';

    document.getElementById('btnMath').classList.remove('active');
    document.getElementById('btnUpload').classList.add('active');
    document.getElementById('btnPlayPause').classList.add('playing');
}

const fileInput = document.getElementById('fileInput');

document.getElementById('btnUpload').onclick = async () => {
    await ensureAudioRunning();
    fileInput.click();
};

fileInput.onchange = async (e) => {
    const file = e.target.files[0];

    if (!file) return;

    await loadAudioFile(file);
};

document.body.addEventListener('dragover', e => {
    e.preventDefault();
});

document.body.addEventListener('drop', async e => {
    e.preventDefault();

    const file = e.dataTransfer.files[0];

    if (file) {
        await loadAudioFile(file);
    }
});

document.getElementById('btnMath').onclick = () => {
    if (audioElement) {
        audioElement.pause();
    }

    mode = 'MATH';
    isPlaying = true;
    elapsedTime = 0;
    startTime = Date.now();

    document.getElementById('mode').textContent = 'MATH';
    document.getElementById('status').textContent = '▶ PLAYING';

    document.getElementById('btnMath').classList.add('active');
    document.getElementById('btnUpload').classList.remove('active');
};

document.getElementById('btnPlayPause').onclick = async () => {
    isPlaying = !isPlaying;

    if (isPlaying) {
        startTime = Date.now() - elapsedTime;

        if (mode === 'IDLE') {
            mode = 'MATH';
        }

        await ensureAudioRunning();

        if (audioElement && audioElement.paused) {
            await audioElement.play();
        }

        document.getElementById('status').textContent = '▶ PLAYING';
        document.getElementById('btnPlayPause').textContent = '⏸ PAUSE';
        document.getElementById('btnPlayPause').classList.add('playing');

    } else {

        if (audioElement) {
            audioElement.pause();
        }

        document.getElementById('status').textContent = '⏸ PAUSED';
        document.getElementById('btnPlayPause').textContent = '▶ PLAY';
        document.getElementById('btnPlayPause').classList.remove('playing');
    }
};

document.getElementById('btnStop').onclick = () => {

    if (audioElement) {
        audioElement.pause();
        audioElement.currentTime = 0;
    }

    isPlaying = false;
    mode = 'IDLE';

    time = 0;
    elapsedTime = 0;

    mBass = 0;
    mMid = 0;
    mHigh = 0;
    mEnergy = 0;

    document.getElementById('mode').textContent = 'IDLE';
    document.getElementById('status').textContent = '⏹ STOPPED';
    document.getElementById('time-display').textContent = '0:00';
};

document.getElementById('btnFullscreen').onclick = async () => {
    if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
    } else {
        await document.exitFullscreen();
    }
};

document.addEventListener('visibilitychange', () => {
    isTabVisible = !document.hidden;
});

function generateMathData() {

    const t = time * 0.02;

    for (let i = 0; i < freqData.length; i++) {

        const bass = Math.sin(t * 0.3 + i * 0.04) * 0.5 + 0.5;
        const mid = Math.cos(t * 1.1 + i * 0.07) * 0.5 + 0.5;
        const high = Math.sin(t * 2.3 + i * 0.11) * 0.5 + 0.5;

        let value;

        if (i < freqData.length * 0.15) {
            value = bass;
        } else if (i < freqData.length * 0.5) {
            value = mid;
        } else {
            value = high;
        }

        freqData[i] = value * 255;
    }
}

function updateAudio() {

    if (!isPlaying || mode === 'IDLE') {

        mBass *= 0.92;
        mMid *= 0.92;
        mHigh *= 0.92;
        mEnergy *= 0.92;

        return;
    }

    if (mode === 'MATH') {
        generateMathData();
    } else if (mode === 'FILE') {
        try {
            analyser.getByteFrequencyData(freqData);
        } catch (e) {}
    }

    const len = freqData.length;

    const bassEnd = Math.floor(len * 0.15);
    const midEnd = Math.floor(len * 0.5);

    let b = 0;
    let m = 0;
    let h = 0;

    for (let i = 0; i < len; i++) {

        if (i < bassEnd) {
            b += freqData[i];
        } else if (i < midEnd) {
            m += freqData[i];
        } else {
            h += freqData[i];
        }
    }

    const bAvg = (b / bassEnd / 255) || 0;
    const mAvg = (m / (midEnd - bassEnd) / 255) || 0;
    const hAvg = (h / (len - midEnd) / 255) || 0;

    mBass += (bAvg - mBass) * 0.15;
    mMid += (mAvg - mMid) * 0.15;
    mHigh += (hAvg - mHigh) * 0.15;

    mEnergy = (mBass + mMid + mHigh) / 3;
}

// DEPTH FOG EFFECT
function drawDepthFog() {
    const gradient = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
    gradient.addColorStop(0, 'rgba(5,5,15,0.3)');
    gradient.addColorStop(0.5, 'rgba(5,5,15,0.5)');
    gradient.addColorStop(1, 'rgba(5,5,15,0.8)');

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
}

// AMBIENT PARTICLES
function drawAmbientParticles(t) {
    for (let i = 0; i < 20; i++) {
        const x = cx + Math.sin(t * 0.1 + i) * 400;
        const y = cy + Math.cos(t * 0.08 + i * 2) * 300;

        const size = 1 + Math.sin(t * 0.3 + i) * 0.5;
        const alpha = 0.3 + Math.sin(t * 0.2 + i) * 0.2;

        ctx.fillStyle = `rgba(0,255,170,${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ENHANCED HEXAGON PANEL
function drawHexPanel(x, y, size, hue, label, energy, t, idx) {

    // GLOW LAYERS
    ctx.fillStyle = `hsla(${hue},100%,50%,${energy * 0.15})`;
    ctx.beginPath();
    ctx.arc(x, y, size * 1.4, 0, Math.PI * 2);
    ctx.fill();

    // PULSING BORDER
    const borderWidth = 2 + energy * 3 + Math.sin(t + idx) * 1;

    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + Math.PI / 6;
        const px = x + size * Math.cos(angle);
        const py = y + size * Math.sin(angle);
        if (i === 0) {
            ctx.moveTo(px, py);
        } else {
            ctx.lineTo(px, py);
        }
    }
    ctx.closePath();

    ctx.strokeStyle = `hsl(${hue},100%,60%)`;
    ctx.lineWidth = borderWidth;
    ctx.stroke();

    // INNER HEXAGON DETAIL
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + Math.PI / 6;
        const px = x + size * 0.65 * Math.cos(angle);
        const py = y + size * 0.65 * Math.sin(angle);
        if (i === 0) {
            ctx.moveTo(px, py);
        } else {
            ctx.lineTo(px, py);
        }
    }
    ctx.closePath();
    ctx.strokeStyle = `hsla(${hue},100%,80%,${0.5 + energy * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // LABEL
    ctx.fillStyle = `hsl(${hue},100%,70%)`;
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
}

// MULTI-LAYER CORE
function drawCentralCore(x, y, energy, t) {

    const size = 60 + energy * 100;

    // OUTER RINGS
    for (let ring = 0; ring < 4; ring++) {
        const r = size * (1 + ring * 0.6);
        const pulse = Math.sin(t * (0.3 + ring * 0.2)) * energy * 25;

        ctx.beginPath();
        ctx.arc(x, y, r + pulse, 0, Math.PI * 2);

        const hue = (t * 40 + ring * 90) % 360;
        ctx.strokeStyle = `hsla(${hue},100%,60%,${0.4 + energy * 0.2})`;
        ctx.lineWidth = 1.5 + energy * 0.5;
        ctx.stroke();
    }

    // CENTRAL HEXAGON
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + Math.PI / 6;
        const px = x + size * Math.cos(angle);
        const py = y + size * Math.sin(angle);
        if (i === 0) {
            ctx.moveTo(px, py);
        } else {
            ctx.lineTo(px, py);
        }
    }
    ctx.closePath();

    const coreHue = (t * 30) % 360;
    ctx.fillStyle = `hsla(${coreHue},100%,50%,${energy * 0.4})`;
    ctx.fill();

    ctx.strokeStyle = `hsl(${coreHue},100%,70%)`;
    ctx.lineWidth = 3;
    ctx.stroke();
}

// COMPLEX RESONANCE FIELD
function drawResonanceField(t) {

    if (mEnergy < 0.08) return;

    for (let ring = 0; ring < 7; ring++) {

        const baseRadius = 80 + ring * 60;
        const waveFreq = 0.5 + ring * 0.25;
        const waveAmp = 8 + mEnergy * 30;

        ctx.beginPath();

        for (let angle = 0; angle <= Math.PI * 2; angle += 0.06) {

            const wave1 = Math.sin(angle * 8 + t * waveFreq) * waveAmp;
            const wave2 = Math.cos(angle * 12 + t * waveFreq * 0.7) * waveAmp * 0.5;

            const distortion = wave1 + wave2;

            const r = baseRadius + distortion;

            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;

            if (angle === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        }

        const ringHue = (t * 60 + ring * 40) % 360;
        ctx.strokeStyle = `hsla(${ringHue},100%,50%,${0.05 + mEnergy * 0.15})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
    }
}

function drawScene() {

    ctx.fillStyle = '#030108';
    ctx.fillRect(0,0,window.innerWidth,window.innerHeight);

    drawDepthFog();

    const t = time * 0.02;

    const positions = [
        { x: -1, y: -1, hue: 200, label: `TOPOLOGICAL` },
        { x: 0, y: -1, hue: 270, label: `QUANTUM` },
        { x: 1, y: -1, hue: 30, label: `RESOURCE` },
        { x: -1, y: 0, hue: 180, label: `INFORMATIONAL` },
        { x: 1, y: 0, hue: 330, label: `ENTROPY` }
    ];

    // Draw hex panels with complex vibrations
    positions.forEach((p, i) => {

        const depth = 1 + p.y * 0.35;

        // Complex vibration patterns
        const vibX = Math.sin(t * 0.4 + i) * mBass * 50 + 
                     Math.cos(t * 0.8 + i * 0.5) * mMid * 30;
        const vibY = Math.cos(t * 0.3 + i) * mMid * 40 + 
                     Math.sin(t * 0.9 + i * 0.7) * mHigh * 20;

        const x = cx + p.x * 220 * depth + vibX;
        const y = cy - 180 + p.y * 180 * depth + vibY;

        const scale = 120 * depth + mEnergy * 50;

        drawHexPanel(x, y, scale, p.hue, p.label, mEnergy, t, i);
    });

    drawAmbientParticles(t);

    drawCentralCore(
        cx + Math.sin(t * 0.35) * mBass * 60,
        cy + 180 + Math.cos(t * 0.6) * mMid * 50,
        mEnergy,
        t
    );

    drawResonanceField(t);

    document.getElementById('bass').textContent = mBass.toFixed(2);
    document.getElementById('mid').textContent = mMid.toFixed(2);
    document.getElementById('high').textContent = mHigh.toFixed(2);
    document.getElementById('energy').textContent = mEnergy.toFixed(2);
}

function render() {

    requestAnimationFrame(render);

    if (!isTabVisible) return;

    if (isPlaying) {
        time++;
    }

    updateAudio();
    drawScene();
}

render();

console.log('◆ HEXAGONAL PARADIGM — PSYCHO RELEASE v1.0 ◆');
</script>

</body>
</html>
