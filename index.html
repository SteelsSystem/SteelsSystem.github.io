<!DOCTYPE html>
<html lang="cs">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lex Forensica — Živý Archiv v13.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cyan: #00e5ff; --red: #ff4444; --amber: #ffb300;
  --green: #00c896; --purple: #7b2fff; --rose: #ff6b9d;
  --dark: #05050f; --mid: #0a0a1a; --surface: #0d0d1e;
  --text: #c8c8d8; --dim: #444458; --bright: #eeeef8;
  --mono: 'Space Mono', monospace;
  --serif: 'IM Fell English', Georgia, serif;
}
body { background: var(--dark); color: var(--text); font-family: var(--serif); overflow-x: hidden; cursor: crosshair; }

/* LAVA */
.lava-wrap { position:fixed; inset:0; z-index:0; overflow:hidden; filter:blur(70px) contrast(1.3); opacity:.14; pointer-events:none; }
.blob { position:absolute; border-radius:50%; animation:float linear infinite; }
.b1{width:500px;height:500px;background:radial-gradient(circle,#00e5ff,transparent 70%);left:3%;top:8%;animation-duration:22s;}
.b2{width:340px;height:420px;background:radial-gradient(circle,#7b2fff,transparent 70%);left:62%;top:55%;animation-duration:30s;animation-delay:-8s;}
.b3{width:380px;height:300px;background:radial-gradient(circle,#ff4444,transparent 70%);left:28%;top:28%;animation-duration:19s;animation-delay:-4s;}
.b4{width:280px;height:360px;background:radial-gradient(circle,#00c896,transparent 70%);left:77%;top:3%;animation-duration:34s;animation-delay:-14s;}
.b5{width:460px;height:240px;background:radial-gradient(circle,#00e5ff,transparent 70%);left:8%;top:72%;animation-duration:26s;animation-delay:-6s;}
.b6{width:220px;height:440px;background:radial-gradient(circle,#ffb300,transparent 70%);left:48%;top:18%;animation-duration:38s;animation-delay:-20s;}
.b7{width:360px;height:360px;background:radial-gradient(circle,#ff6b9d,transparent 70%);left:85%;top:82%;animation-duration:21s;animation-delay:-2s;}
.b8{width:300px;height:500px;background:radial-gradient(circle,#7b2fff,transparent 70%);left:15%;top:40%;animation-duration:42s;animation-delay:-16s;}
@keyframes float {
  0%   {transform:translateY(0)    translateX(0)    scale(1);}
  25%  {transform:translateY(-90px) translateX(40px) scale(1.1);}
  50%  {transform:translateY(-50px) translateX(-30px)scale(.92);}
  75%  {transform:translateY(-130px)translateX(15px) scale(1.15);}
  100% {transform:translateY(0)    translateX(0)    scale(1);}
}

/* GRAIN OVERLAY */
body::after {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  background-size:180px 180px; opacity:.3;
}

/* CONTROLS */
.top-controls { position:fixed; top:24px; right:24px; z-index:200; display:flex; gap:10px; align-items:center; }
.lang-btn { background:transparent; border:1px solid #00e5ff18; color:#00e5ff44; padding:6px 13px; font-family:var(--mono); font-size:9px; cursor:pointer; letter-spacing:2px; transition:all .3s; }
.lang-btn.active { color:var(--cyan); border-color:var(--cyan); background:#00e5ff08; }

/* ARCHIVE NAV */
.arc-nav { position:fixed; top:24px; left:24px; z-index:200; display:flex; flex-direction:column; gap:6px; }
.arc-nav-item { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:#ffffff14; cursor:pointer; padding:4px 0; transition:color .3s; border:none; background:none; text-align:left; text-transform:uppercase; }
.arc-nav-item:hover,.arc-nav-item.active { color:var(--cyan); }

/* LAYOUT */
.page { position:relative; z-index:3; max-width:760px; margin:0 auto; padding:0 32px 180px; }

/* REVEAL */
.reveal { opacity:0; transform:translateY(28px); transition:opacity .9s ease, transform .9s ease; }
.reveal.on { opacity:1; transform:translateY(0); }

/* HERO */
.hero { min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:80px 0; }
.hero-eyebrow { font-family:var(--mono); font-size:8px; letter-spacing:6px; color:#00e5ff28; text-transform:uppercase; margin-bottom:32px; }
.hero-title { font-size:clamp(38px,7vw,72px); font-weight:400; letter-spacing:8px; color:#fff; text-shadow:0 0 80px #00e5ff33; margin-bottom:10px; line-height:1.15; font-family:var(--serif); font-style:italic; }
.hero-version { font-family:var(--mono); font-size:9px; letter-spacing:4px; color:#00e5ff44; margin-bottom:72px; }
.hero-lead { font-size:17px; color:#777788; line-height:2.4; max-width:580px; font-style:italic; font-family:var(--serif); }
.hero-lead span { color:#00e5ffaa; font-style:normal; }
.scroll-hint { margin-top:90px; font-family:var(--mono); font-size:8px; letter-spacing:5px; color:#ffffff10; text-transform:uppercase; animation:blink 2.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.1;} 50%{opacity:.5;} }

/* ARCHIVE INDEX */
.archive-index { border:1px solid #ffffff06; padding:32px; margin:40px 0; background:#ffffff02; }
.arc-index-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.arc-index-title { font-family:var(--mono); font-size:9px; letter-spacing:4px; color:#00e5ff66; text-transform:uppercase; }
.arc-index-count { font-family:var(--mono); font-size:9px; color:#ffffff22; }
.arc-filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.arc-tag { font-family:var(--mono); font-size:8px; letter-spacing:2px; padding:4px 10px; border:1px solid #ffffff10; color:#ffffff33; cursor:pointer; transition:all .25s; background:none; text-transform:uppercase; }
.arc-tag.active,.arc-tag:hover { border-color:var(--cyan); color:var(--cyan); background:#00e5ff08; }
.arc-entries { display:flex; flex-direction:column; gap:10px; }
.arc-entry { display:flex; gap:20px; align-items:baseline; padding:8px 0; border-bottom:1px solid #ffffff04; cursor:pointer; transition:all .2s; }
.arc-entry:hover { border-bottom-color:#00e5ff22; }
.arc-entry:hover .arc-entry-title { color:var(--cyan); }
.arc-entry-id { font-family:var(--mono); font-size:8px; color:#ffffff18; min-width:54px; }
.arc-entry-title { font-size:13px; color:#888898; flex:1; }
.arc-entry-tag { font-family:var(--mono); font-size:7px; letter-spacing:2px; padding:2px 7px; border:1px solid #ffffff08; color:#ffffff20; text-transform:uppercase; }
.arc-entry-tag.cyan { border-color:#00e5ff22; color:#00e5ff55; }
.arc-entry-tag.red { border-color:#ff444422; color:#ff444455; }
.arc-entry-tag.amber { border-color:#ffb30022; color:#ffb30055; }
.arc-entry-tag.purple { border-color:#7b2fff22; color:#7b2fff55; }
.arc-entry-tag.green { border-color:#00c89622; color:#00c89655; }

/* DIVIDER */
.sec-div { display:flex; align-items:center; gap:20px; margin:90px 0 52px; }
.sec-div-line { flex:1; height:1px; background:linear-gradient(to right,transparent,#00e5ff18,transparent); }
.sec-div-label { font-family:var(--mono); font-size:8px; letter-spacing:5px; color:#00e5ff28; text-transform:uppercase; white-space:nowrap; }

/* META GRID */
.meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:40px 0; }
@media(max-width:600px){.meta-grid{grid-template-columns:1fr;}}
.meta-card { border:1px solid #ffffff06; border-radius:1px; padding:26px 22px; background:#ffffff02; transition:border-color .4s,background .4s; min-height:200px; }
.meta-card:hover { border-color:#00e5ff1a; background:#00e5ff03; }
.meta-card-icon { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:#00e5ff33; margin-bottom:12px; text-transform:uppercase; }
.meta-card-title { font-size:14px; color:#dddded; margin-bottom:10px; font-family:var(--serif); letter-spacing:1px; }
.meta-card-body { font-size:12px; color:#55556a; line-height:2; }
.meta-card-body em { color:#00e5ffaa; font-style:normal; }
.meta-card-body .accent-red { color:#ff444488; }
.meta-card-body .accent-amber { color:#ffb30088; }
.meta-card-body .accent-green { color:#00c89688; }
.meta-card-body .accent-purple { color:#7b2fff88; }

/* POEM */
.poem { margin:50px 0; }
.stanza { margin-bottom:56px; padding-left:20px; border-left:1px solid #00e5ff0a; }
.stanza-label { font-family:var(--mono); font-size:7px; letter-spacing:4px; color:#00e5ff22; margin-bottom:16px; text-transform:uppercase; }
.stanza p { font-size:16px; line-height:2.4; color:#b8b8c8; font-weight:400; font-family:var(--serif); }
.ln-joy { color:var(--cyan) !important; font-style:italic; text-shadow:0 0 12px #00e5ff22; }
.ln-red { color:#ff444488 !important; font-style:italic; }
.ln-amber { color:#ffb30088 !important; font-style:italic; }
.ln-dim { color:#33333f !important; font-size:12px !important; font-family:var(--mono) !important; letter-spacing:1px !important; }
.ln-bright { color:#ffffff99 !important; font-weight:400 !important; }

/* AXIOMS */
.axiom-list { margin:40px 0; }
.axiom-item { display:flex; gap:24px; margin-bottom:28px; padding-bottom:28px; border-bottom:1px solid #ffffff05; }
.axiom-item:last-child { border-bottom:none; }
.axiom-code { font-family:var(--mono); font-size:9px; letter-spacing:2px; min-width:48px; padding-top:3px; }
.axiom-code.c { color:#00e5ff55; }
.axiom-code.r { color:#ff444455; }
.axiom-code.a { color:#ffb30055; }
.axiom-code.p { color:#7b2fff55; }
.axiom-code.g { color:#00c89655; }
.axiom-name { font-size:13px; color:#dddded; margin-bottom:6px; letter-spacing:.5px; font-family:var(--serif); }
.axiom-body { font-size:12px; color:#444458; line-height:1.95; }
.axiom-body em { font-style:normal; }
.axiom-body em.c { color:#ff444488; }
.axiom-body em.a { color:#ffb30088; }
.axiom-body em.g { color:#00c89688; }
.axiom-body em.p { color:#7b2fff88; }
.axiom-body em.b { color:#00e5ffaa; }

/* PROTOCOLS */
.protocol-list { margin:40px 0; }
.protocol-item { border:1px solid #ffffff06; margin-bottom:12px; overflow:hidden; transition:border-color .3s; }
.protocol-item:hover { border-color:#00e5ff15; }
.protocol-header { display:flex; align-items:center; gap:16px; padding:16px 20px; cursor:pointer; }
.protocol-num { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:#00e5ff33; min-width:44px; }
.protocol-name { font-size:13px; color:#9999aa; font-family:var(--serif); flex:1; }
.protocol-status { font-family:var(--mono); font-size:7px; letter-spacing:2px; padding:2px 8px; border:1px solid; text-transform:uppercase; }
.status-active { border-color:#00c89633; color:#00c89666; }
.status-pending { border-color:#ffb30033; color:#ffb30066; }
.status-locked { border-color:#ff444433; color:#ff444466; }
.protocol-body { font-size:12px; color:#444458; line-height:2; padding:0 20px 18px 80px; display:none; }
.protocol-body.open { display:block; }
.protocol-body em { color:#00e5ffaa; font-style:normal; }

/* CASE FILES */
.case-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin:40px 0; }
@media(max-width:640px){.case-grid{grid-template-columns:1fr;}}
.case-card { border:1px solid #ffffff05; padding:20px 16px; background:#ffffff01; }
.case-card:hover { border-color:#00e5ff12; }
.case-id { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:#ffffff18; margin-bottom:8px; text-transform:uppercase; }
.case-title { font-size:12px; color:#8888a0; margin-bottom:8px; font-family:var(--serif); }
.case-stat { display:flex; justify-content:space-between; margin-top:12px; }
.case-stat-val { font-family:var(--mono); font-size:11px; }
.case-stat-val.up { color:#00c89666; }
.case-stat-val.dn { color:#ff444466; }
.case-stat-val.nt { color:#ffffff22; }
.case-stat-label { font-family:var(--mono); font-size:7px; letter-spacing:2px; color:#ffffff15; text-transform:uppercase; }

/* FIELD NOTES */
.field-notes { margin:40px 0; }
.field-note { display:flex; gap:20px; margin-bottom:22px; }
.field-note-ts { font-family:var(--mono); font-size:8px; color:#ffffff15; min-width:80px; padding-top:4px; letter-spacing:1px; }
.field-note-body { font-size:13px; color:#555568; line-height:1.9; border-left:1px solid #ffffff06; padding-left:16px; font-family:var(--serif); font-style:italic; }
.field-note-body strong { color:#9999aa; font-style:normal; font-weight:400; }
.field-note-body .mark { color:#00e5ff88; font-style:normal; }

/* SIGNAL LOG */
.signal-log { font-family:var(--mono); font-size:10px; line-height:2; color:#333345; margin:40px 0; padding:24px; border:1px solid #ffffff04; background:#000000aa; overflow:hidden; max-height:320px; overflow-y:auto; }
.signal-log::-webkit-scrollbar { width:2px; }
.signal-log::-webkit-scrollbar-thumb { background:#00e5ff22; }
.sig-line { display:flex; gap:12px; }
.sig-ts { color:#00e5ff18; min-width:72px; }
.sig-type { min-width:60px; }
.sig-type.ok { color:#00c89644; }
.sig-type.warn { color:#ffb30044; }
.sig-type.crit { color:#ff444444; }
.sig-type.info { color:#7b2fff44; }
.sig-msg { color:#444458; }
.sig-msg .hl { color:#00e5ff66; }
.cursor-blink { animation:blink 1.2s step-end infinite; }

/* THERMAL MAP */
.thermal-wrap { margin:40px 0; }
.thermal-title { font-family:var(--mono); font-size:8px; letter-spacing:4px; color:#00e5ff33; text-transform:uppercase; margin-bottom:16px; }
.thermal-grid { display:grid; grid-template-columns:repeat(20,1fr); gap:3px; }
.cell { aspect-ratio:1; border-radius:1px; transition:all .3s; cursor:crosshair; }
.cell:hover { transform:scale(1.4); z-index:10; position:relative; }

/* SCORE */
.score-section { text-align:center; padding:100px 20px; }
.score-num { font-size:110px; font-family:var(--mono); font-weight:400; color:var(--cyan); letter-spacing:-8px; line-height:1; text-shadow:0 0 80px #00e5ff44; animation:glow-pulse 3.2s ease-in-out infinite; display:block; margin-bottom:20px; }
@keyframes glow-pulse { 0%,100%{text-shadow:0 0 40px #00e5ff33;} 50%{text-shadow:0 0 100px #00e5ffaa;} }
.score-tag { font-family:var(--mono); font-size:8px; letter-spacing:6px; color:#00e5ff22; text-transform:uppercase; margin-bottom:24px; }
.score-bar-wrap { max-width:460px; margin:32px auto 0; height:1px; background:#ffffff08; position:relative; }
.score-bar-fill { position:absolute; left:0; top:0; height:1px; width:0%; background:linear-gradient(to right,#00e5ff,#7b2fff,#ff6b9d); box-shadow:0 0 10px #00e5ff66; transition:width 2.4s cubic-bezier(.16,1,.3,1); }
.score-sub-bars { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-top:48px; }
.sub-bar-item { text-align:left; width:160px; }
.sub-bar-label { font-family:var(--mono); font-size:7px; letter-spacing:2px; color:#ffffff18; text-transform:uppercase; margin-bottom:6px; }
.sub-bar-track { height:1px; background:#ffffff08; position:relative; }
.sub-bar-fill { position:absolute; left:0; top:0; height:1px; width:0%; transition:width 2.6s cubic-bezier(.16,1,.3,1); }
.sub-bar-val { font-family:var(--mono); font-size:8px; margin-top:5px; }

/* CLOSING */
.closing { text-align:center; padding:60px 0 40px; }
.closing p { font-size:16px; color:#666676; line-height:2.5; font-family:var(--serif); font-style:italic; }
.final-stamp { margin-top:60px; display:inline-block; border:1px solid #00e5ff0a; padding:18px 36px; font-family:var(--mono); font-size:8px; letter-spacing:3px; color:#00e5ff18; text-transform:uppercase; line-height:2.2; }

footer { text-align:center; padding:60px 0 40px; font-family:var(--mono); font-size:8px; letter-spacing:3px; color:#ffffff06; text-transform:uppercase; border-top:1px solid #ffffff04; }

/* SCROLLBAR */
::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#00e5ff18; }

/* SECTION ANCHOR */
.section-anchor { position:relative; top:-80px; }
</style>
</head>
<body>

<div class="lava-wrap" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="blob b4"></div><div class="blob b5"></div><div class="blob b6"></div>
  <div class="blob b7"></div><div class="blob b8"></div>
</div>

<nav class="arc-nav" id="arc-nav"></nav>

<div class="top-controls">
  <button class="lang-btn active" onclick="switchLang('cs')">CS</button>
  <button class="lang-btn" onclick="switchLang('en')">EN</button>
</div>

<div class="page">

  <section class="hero">
    <div class="reveal on">
      <div class="hero-eyebrow" data-key="eyebrow"></div>
      <h1 class="hero-title">LEX FORENSICA</h1>
      <div class="hero-version" data-key="sub"></div>
      <p class="hero-lead" data-key="heroLead"></p>
      <div class="scroll-hint" data-key="scrollHint"></div>
    </div>
  </section>

  <!-- ARCHIVE INDEX -->
  <div class="section-anchor" id="sec-index"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divIndex">Živý Archiv · Navigace</div>
    <div class="sec-div-line"></div>
  </div>
  <div class="archive-index reveal" id="archive-index-wrap">
    <div class="arc-index-header">
      <span class="arc-index-title" data-key="indexTitle">Index archivu</span>
      <span class="arc-index-count" id="arc-count"></span>
    </div>
    <div class="arc-filter" id="arc-filter"></div>
    <div class="arc-entries" id="arc-entries"></div>
  </div>

  <!-- META GRID -->
  <div class="section-anchor" id="sec-konfidence"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divLabel1"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="meta-grid reveal" id="meta-grid"></div>

  <!-- POEM -->
  <div class="section-anchor" id="sec-poem"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divPoem"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="poem" id="poem"></div>

  <!-- AXIOMS -->
  <div class="section-anchor" id="sec-axiomy"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divAxioms"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="axiom-list" id="axiom-list"></div>

  <!-- PROTOCOLS -->
  <div class="section-anchor" id="sec-protokoly"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divProtocols"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="protocol-list reveal" id="protocol-list"></div>

  <!-- CASE FILES -->
  <div class="section-anchor" id="sec-soubory"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divCases"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="case-grid reveal" id="case-grid"></div>

  <!-- FIELD NOTES -->
  <div class="section-anchor" id="sec-poznamky"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divNotes"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="field-notes reveal" id="field-notes"></div>

  <!-- SIGNAL LOG -->
  <div class="section-anchor" id="sec-signal"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divSignal"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="signal-log reveal" id="signal-log"></div>

  <!-- THERMAL MAP -->
  <div class="section-anchor" id="sec-thermal"></div>
  <div class="sec-div reveal">
    <div class="sec-div-line"></div>
    <div class="sec-div-label" data-key="divThermal"></div>
    <div class="sec-div-line"></div>
  </div>
  <div class="thermal-wrap reveal">
    <div class="thermal-title" data-key="thermalTitle"></div>
    <div class="thermal-grid" id="thermal-grid"></div>
  </div>

  <!-- SCORE -->
  <div class="section-anchor" id="sec-score"></div>
  <div class="score-section reveal">
    <span class="score-num" id="score-num">0.00</span>
    <div class="score-tag" data-key="scoreTag"></div>
    <div class="score-bar-wrap"><div class="score-bar-fill" id="score-bar"></div></div>
    <div class="score-sub-bars" id="score-sub-bars"></div>
    <div id="score-context" style="margin-top:32px;font-family:var(--mono);font-size:10px;color:#333345;line-height:2;"></div>
  </div>

  <!-- CLOSING -->
  <div class="closing reveal" id="closing"></div>
</div>

<footer id="footer-text"></footer>

// ─────────────────────────────────────────────────────────────────────
//  STATE & RENDERER
// ─────────────────────────────────────────────────────────────────────
let lang = 'cs';
let activeFilter = null;

function switchLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase()===l));
  render();
}

function render() {
  const t = T[lang];

  // Static keys
  document.querySelectorAll('[data-key]').forEach(el => {
    const v = t[el.dataset.key];
    if(v !== undefined) el.innerHTML = v;
  });

  // Nav
  const navSections = [
    {id:'sec-index',   key:'divIndex'},
    {id:'sec-konfidence',key:'divLabel1'},
    {id:'sec-poem',    key:'divPoem'},
    {id:'sec-axiomy',  key:'divAxioms'},
    {id:'sec-protokoly',key:'divProtocols'},
    {id:'sec-soubory', key:'divCases'},
    {id:'sec-poznamky',key:'divNotes'},
    {id:'sec-signal',  key:'divSignal'},
    {id:'sec-thermal', key:'divThermal'},
    {id:'sec-score',   key:'scoreTag'},
  ];
  document.getElementById('arc-nav').innerHTML = navSections.map(s=>`
    <button class="arc-nav-item" onclick="document.getElementById('${s.id}').scrollIntoView({behavior:'smooth'})">${T[lang][s.key].split('·')[0].trim()}</button>
  `).join('');

  // Archive index
  const allTags = t.arcTags;
  const filterEl = document.getElementById('arc-filter');
  filterEl.innerHTML = allTags.map(tag=>`
    <button class="arc-tag ${(!activeFilter && tag===allTags[0]) || activeFilter===tag ? 'active':''}"
      onclick="setFilter('${tag}','${allTags[0]}')">${tag}</button>
  `).join('');
  renderArcEntries();

  // Meta grid
  document.getElementById('meta-grid').innerHTML = t.meta.map(m=>`
    <div class="meta-card reveal on">
      <div class="meta-card-icon">${m.i}</div>
      <div class="meta-card-title">${m.t}</div>
      <div class="meta-card-body">${m.b}</div>
    </div>`).join('');

  // Poem
  document.getElementById('poem').innerHTML = t.poem.map(s=>`
    <div class="stanza reveal on">
      <div class="stanza-label">${s.label}</div>
      ${s.lines.map(l=>`<p>${l}</p>`).join('')}
    </div>`).join('');

  // Axioms
  document.getElementById('axiom-list').innerHTML = t.axioms.map(a=>`
    <div class="axiom-item reveal on">
      <div class="axiom-code ${a.cl}">${a.c}</div>
      <div>
        <div class="axiom-name">${a.n}</div>
        <div class="axiom-body">${a.b}</div>
      </div>
    </div>`).join('');

  // Protocols
  document.getElementById('protocol-list').innerHTML = t.protocols.map((p,i)=>`
    <div class="protocol-item">
      <div class="protocol-header" onclick="toggleProtocol(${i})">
        <div class="protocol-num">${p.num}</div>
        <div class="protocol-name">${p.name}</div>
        <div class="protocol-status status-${p.status}">${p.status}</div>
      </div>
      <div class="protocol-body" id="proto-${i}">${p.body}</div>
    </div>`).join('');

  // Cases
  document.getElementById('case-grid').innerHTML = t.cases.map(c=>`
    <div class="case-card">
      <div class="case-id">${c.id}</div>
      <div class="case-title">${c.title}</div>
      <div class="case-stat">
        <div>
          <div class="case-stat-val ${c.dir}">${c.stat}</div>
          <div class="case-stat-label">${c.label}</div>
        </div>
      </div>
    </div>`).join('');

  // Field notes
  document.getElementById('field-notes').innerHTML = t.notes.map(n=>`
    <div class="field-note">
      <div class="field-note-ts">${n.ts}</div>
      <div class="field-note-body">${n.body}</div>
    </div>`).join('');

  // Signal log
  document.getElementById('signal-log').innerHTML = t.signals.map(s=>`
    <div class="sig-line">
      <span class="sig-ts">${s.ts}</span>
      <span class="sig-type ${s.t.toLowerCase()}">${s.t}</span>
      <span class="sig-msg">${s.m}</span>
    </div>`).join('');

  // Sub bars
  document.getElementById('score-sub-bars').innerHTML = t.subBars.map((b,i)=>`
    <div class="sub-bar-item">
      <div class="sub-bar-label">${b.label}</div>
      <div class="sub-bar-track">
        <div class="sub-bar-fill" id="sub-${i}" style="background:${b.color}"></div>
      </div>
      <div class="sub-bar-val" style="color:${b.color}44">—</div>
    </div>`).join('');

  // Others
  document.getElementById('score-context').textContent = t.scoreContext;
  document.getElementById('closing').innerHTML = t.closing;
  document.getElementById('footer-text').textContent = t.footer;

  // Thermal
  buildThermal();

  // Re-observe reveals
  document.querySelectorAll('.reveal:not(.on)').forEach(el => io.observe(el));
}

function setFilter(tag, allLabel) {
  activeFilter = (tag===allLabel) ? null : tag;
  render();
}

function renderArcEntries() {
  const t = T[lang];
  const all = t.arcTags[0];
  const entries = activeFilter
    ? t.arcEntries.filter(e => e.tag === activeFilter)
    : t.arcEntries;
  document.getElementById('arc-count').textContent = `${entries.length} ${t.indexCount}`;
  document.getElementById('arc-entries').innerHTML = entries.map(e=>`
    <div class="arc-entry">
      <div class="arc-entry-id">${e.id}</div>
      <div class="arc-entry-title">${e.title}</div>
      <div class="arc-entry-tag ${e.color}">${e.tag}</div>
    </div>`).join('');
}

function toggleProtocol(i) {
  const el = document.getElementById(`proto-${i}`);
  el.classList.toggle('open');
}

function buildThermal() {
  const grid = document.getElementById('thermal-grid');
  const colors = ['#00e5ff','#7b2fff','#ff4444','#ffb300','#00c896','#ff6b9d'];
  grid.innerHTML = '';
  for(let i=0;i<200;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    const c = colors[Math.floor(Math.random()*colors.length)];
    const o = (Math.random()*.5+.05).toFixed(2);
    cell.style.background = c;
    cell.style.opacity = o;
    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────────────────────────────────
//  INTERSECTION OBSERVER + SCORE ANIMATION
// ─────────────────────────────────────────────────────────────────────
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('on'); });
},{threshold:.08});

window.addEventListener('load',()=>{
  render();
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

  // Score number
  const numEl = document.getElementById('score-num');
  const barEl = document.getElementById('score-bar');
  let scoreFired = false;
  const sio = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting && !scoreFired){
        scoreFired = true;
        const t0 = performance.now();
        const anim = now=>{
          const p = Math.min((now-t0)/2800,1);
          const v = 1-Math.pow(1-p,3);
          numEl.textContent = (0.91*v).toFixed(2);
          barEl.style.width = (0.91*v*100)+'%';
          // Sub bars
          T[lang].subBars.forEach((b,i)=>{
            const el = document.getElementById(`sub-${i}`);
            const vEl = el?.nextElementSibling;
            if(el) el.style.width = (b.val*v*100)+'%';
            if(vEl) vEl.textContent = (b.val*v).toFixed(2);
          });
          if(p<1) requestAnimationFrame(anim);
        };
        requestAnimationFrame(anim);
      }
    });
  },{threshold:.2});
  sio.observe(document.querySelector('.score-section'));

  // Auto-scroll signal log to bottom after delay
  setTimeout(()=>{
    const log = document.getElementById('signal-log');
    if(log) log.scrollTop = log.scrollHeight;
  },1200);
});
</script>
