<script>
/* =============================================================
   HEX-NLP MANIFOLD v15
   NEW: SUSPENDED mode вЂ” activates on audio pause.
   Waveform memory decays slowly. Hex field morphs via
   fluid noise displacement. Thermal color shift (tealв†’violet/amber).
   All existing modes preserved when audio plays/resumes.
   ============================================================= */

// в”Ђв”Ђ NLP 12-PLANE TAXONOMY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const NLP12 = [
  { id:0,  label:'ASSERTвЃє', hue:165 }, { id:1,  label:'ASSERTвЃ»', hue:180 },
  { id:2,  label:'DIRECTвЃє', hue:195 }, { id:3,  label:'DIRECTвЃ»', hue:210 },
  { id:4,  label:'COMMITвЃє', hue:255 }, { id:5,  label:'COMMITвЃ»', hue:275 },
  { id:6,  label:'EXPRвЃє',   hue:300 }, { id:7,  label:'EXPRвЃ»',   hue:325 },
  { id:8,  label:'DECLвЃє',   hue:15  }, { id:9,  label:'DECLвЃ»',   hue:35  },
  { id:10, label:'METAвЃє',   hue:55  }, { id:11, label:'METAвЃ»',   hue:75  },
];

const AXIOMS = [
  'A0 В· Pipeline integrity verified','A1 В· Axiom validation active',
  'A2 В· LOOP_CYCLE verifikace','A3 В· Zero-Knowledge ЕЎifrovГЎnГ­ вњ“',
  'A4 В· Narativ chrГЎnД›n В· О©','A5 В· ForenznГ­ pЕ™esnost: ON',
  'A6 В· DЕЇstojnost > Proces','A7 В· ECHR/CRPD/GDPR layer',
  'A8 В· Financial forensic active','A9 В· Control Room synced',
  'A10 В· Visual network aligned','A11 В· META signal detected',
  'A12 В· NLP_DRIFT: monitoring','A13 В· LOOP_CYCLE в†’100%',
];

const AXIOMS_SUSPENDED = [
  'SUSPENDED В· Signal at rest',
  'LIQUID STATE В· Memory decaying',
  'Waveform echo В· fading',
  'Manifold holds last shape',
  'Fluid morphology active',
  'Thermal drift В· violet band',
  'Zero-pressure mode В· О©',
  'Waiting for signal resume',
  'Memory half-life: 8s',
  'NLP sectors: ambient',
];

// Build legend
const legendEl = document.getElementById('nlp-legend');
NLP12.forEach(n => {
  const d = document.createElement('div');
  d.className = 'text-[8px] truncate';
  d.style.color = `hsl(${n.hue},88%,60%)`;
  d.innerHTML = `<span style="opacity:.35">[${n.id}]</span> ${n.label}`;
  legendEl.appendChild(d);
});

let axiomIdx = 0;
let axiomPool = AXIOMS;
setInterval(() => {
  axiomIdx = (axiomIdx + 1) % axiomPool.length;
  document.getElementById('axiomDisplay').textContent = axiomPool[axiomIdx];
}, 2800);

// в”Ђв”Ђ AUDIO ENGINE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const audio  = new Audio();

let aCtx, analyser, freqData, waveData;
let isStarted    = false;
let nlpActive    = true;
let visualMode   = 0;
let intensityMul = 1.0;
const MODES = ['FLUID','STATIC','DEEP'];

// в”Ђв”Ђ SUSPENDED STATE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// isPaused: true when audio is paused after having started
// suspendBlend: 0 = fully active, 1 = fully suspended (smooth transition)
// memFreq / memWave: frozen copy of last frame's audio data, decaying over time
let isPaused      = false;
let suspendBlend  = 0;     // lerp target 0 or 1
let suspendLerp   = 0;     // actual blended value
let memFreq, memWave;      // memory buffers вЂ” filled on pause, decay each frame
let memDecay      = 0.9985; // per-frame decay (full silence after ~8s at 60fps)
let suspendT      = 0;     // local time for suspended fluid sim, runs slower

// Fluid noise offset fields вЂ” drive hex cell displacement in suspended mode
// We use a simple layered sine approximation (no external lib needed)
function fluidNoise(x, y, st) {
  const a = Math.sin(x*0.018 + st*0.28 + Math.cos(y*0.022 + st*0.19)*1.2)*0.5+0.5;
  const b = Math.sin(y*0.021 - st*0.21 + Math.cos(x*0.016 - st*0.14)*1.1)*0.5+0.5;
  const c = Math.sin((x+y)*0.013 + st*0.16)*0.5+0.5;
  return (a*0.45 + b*0.35 + c*0.20);
}

// Blob displacement вЂ” gives cells a liquid-surface wobble when suspended
function fluidDisplace(hx, hy, st, strength) {
  const dx = Math.sin(hx*0.019 + hy*0.011 + st*0.33)*strength;
  const dy = Math.cos(hx*0.012 - hy*0.017 - st*0.27)*strength;
  return { dx, dy };
}

// UI transition helpers
function setSuspendedUI(on) {
  const panels  = document.querySelectorAll('.glass');
  const title   = document.getElementById('titleText');
  const playBtn = document.getElementById('play');
  panels.forEach(p => p.classList.toggle('suspended', on));
  title.classList.toggle('suspended', on);
  playBtn.classList.toggle('suspended-btn', on);
}

function setStatus(msg, type='active') {
  document.getElementById('status').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' +
    (type==='idle'?' idle':type==='warn'?' warn':type==='suspended'?' suspended':'');
}

function initAudio() {
  if (aCtx) return;
  aCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = aCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.80;
  const src = aCtx.createMediaElementSource(audio);
  src.connect(analyser); analyser.connect(aCtx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  waveData = new Uint8Array(analyser.frequencyBinCount);
  // init memory buffers
  memFreq = new Float32Array(analyser.frequencyBinCount);
  memWave = new Float32Array(analyser.frequencyBinCount);
  isStarted = true;
  setStatus('Manifold Active В· NLP12 Engaged');
}

// Capture memory snapshot when pausing
function captureMemory() {
  if (!freqData || !waveData) return;
  for (let i=0; i<freqData.length; i++) {
    memFreq[i] = freqData[i];
    memWave[i] = waveData[i];
  }
}

// Decay memory toward silence each frame while suspended
function decayMemory() {
  for (let i=0; i<memFreq.length; i++) {
    memFreq[i] *= memDecay;
    // wave decays toward 128 (silence center)
    memWave[i] = 128 + (memWave[i]-128)*memDecay;
  }
}

document.getElementById('aud').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  audio.src = URL.createObjectURL(f);
  document.getElementById('fileLabel').textContent = 'в™Є ' + f.name.slice(0,22);
  setStatus('SRC: ' + f.name.slice(0,20));
};

document.getElementById('play').onclick = () => {
  initAudio();
  if (aCtx.state === 'suspended') aCtx.resume();
  if (audio.paused) {
    audio.play();
    isPaused = false;
    suspendBlend = 0;
    axiomPool = AXIOMS;
    setSuspendedUI(false);
    document.getElementById('play').textContent = 'PAUSE SIGNAL';
    setStatus('Signal streaming В· NLP active');
  } else {
    audio.pause();
    isPaused = true;
    suspendBlend = 1;
    suspendT = 0;
    axiomPool = AXIOMS_SUSPENDED;
    axiomIdx  = 0;
    captureMemory();
    setSuspendedUI(true);
    document.getElementById('play').textContent = 'RESUME SIGNAL';
    setStatus('SUSPENDED В· Fluid mode active', 'suspended');
  }
};

document.getElementById('toggleNLP').onclick = function() {
  nlpActive = !nlpActive;
  this.textContent = nlpActive ? 'NLP: ON' : 'NLP: OFF';
  this.classList.toggle('active', nlpActive);
};
document.getElementById('toggleMode').onclick = function() {
  visualMode = (visualMode + 1) % 3;
  this.textContent = MODES[visualMode];
};
document.getElementById('intensity').oninput = function() {
  intensityMul = parseFloat(this.value);
};

// в”Ђв”Ђ GLOBAL STATE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let t = 0;

const mouse    = { x: 0.5, y: 0.5 };
const mouseTgt = { x: 0.5, y: 0.5 };
window.addEventListener('pointermove', e => {
  mouseTgt.x = e.clientX / window.innerWidth;
  mouseTgt.y = e.clientY / window.innerHeight;
});

let beatEnergy   = 0;
let beatHold     = 0;
let beatBaseline = 0;
let beatImpact   = 0;

const PART_MAX = 600;
const parts = [];
const rings = [];

const seeds = Array.from({length:6}, () => ({
  ox: Math.random()*900, oy: Math.random()*600,
  freq: 0.25 + Math.random()*0.5,
  phase: Math.random()*Math.PI*2,
}));

const GLYPHS = 'ASSERT+ASSERT-DIRECT+DIRECT-COMMIT+COMMIT-EXPR+EXPR-DECL+DECL-META+META-О©ZKв†’в‰ в‰Ўв€ћ';
const RAIN_N = 26;
const rain = Array.from({length:RAIN_N}, (_,i) => ({
  x:0, y:-Math.random()*600,
  speed: 0.45 + Math.random()*1.1,
  hue: NLP12[i%12].hue,
  col: Array.from({length:10}, ()=>GLYPHS[Math.floor(Math.random()*GLYPHS.length)]),
  alpha: 0.025 + Math.random()*0.045,
}));

// в”Ђв”Ђ HELPERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function idleVal(x, y) {
  let v = 0;
  for (const s of seeds) {
    const d = Math.hypot(x-s.ox, y-s.oy);
    v += Math.sin(d*0.011 - t*s.freq + s.phase)*0.5 + 0.5;
  }
  return Math.min(255, (v/seeds.length)*72 + 14);
}

function sectorOf(x, y, cx, cy) {
  const a = Math.atan2(y-cy, x-cx);
  return Math.floor(((a*180/Math.PI)+360)%360/30);
}

function readFreq(dist, W, H, buf) {
  const fi = Math.floor((dist/(Math.max(W,H)*0.72))*(buf.length/2)) % (buf.length/2);
  return buf[fi];
}

// в”Ђв”Ђ BEAT DETECTION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function processBeat() {
  beatImpact = 0;
  if (!isStarted || isPaused) return;
  let low = 0;
  const N = Math.min(20, freqData.length);
  for (let i=0; i<N; i++) low += freqData[i];
  low /= N;
  beatBaseline = beatBaseline*0.93 + low*0.07;
  const delta  = Math.max(0, low - beatBaseline);
  beatImpact   = delta > 14 ? Math.min(1, delta/80) : 0;
  if (beatImpact > 0.08 && beatHold <= 0) {
    beatHold = 10;
    if (rings.length < 8)
      rings.push({ r:12, a: 0.55 + beatImpact*0.35, w: 1.2 + beatImpact*5 });
  } else { beatHold--; }
  beatEnergy = beatEnergy*0.88 + beatImpact*0.38;
}

function spawnParticle(x, y, hue, power) {
  if (parts.length >= PART_MAX) return;
  const spd = 0.6 + power*2.4;
  const ang = Math.random()*Math.PI*2;
  parts.push({
    x, y,
    vx: Math.cos(ang)*spd*(0.5+Math.random()),
    vy: Math.sin(ang)*spd*(0.5+Math.random()),
    life: 30 + Math.random()*40, max:70,
    r: 0.6 + Math.random()*1.8 + power, hue,
  });
}

// в”Ђв”Ђ LAYER RENDERERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function renderGlyphRain(W, H, blend) {
  const cw = W/RAIN_N;
  ctx.font = '7px Share Tech Mono,Courier New';
  ctx.textAlign = 'center';
  // In suspended mode, rain slows and shifts hue toward violet
  const speedMul = blend > 0 ? (1 - blend*0.72) : 1;
  for (const col of rain) {
    col.x = (rain.indexOf(col)+0.5)*cw;
    col.y += col.speed * speedMul;
    if (col.y > H+180) { col.y = -60-Math.random()*300; col.speed = 0.4+Math.random()*1.2; }
    col.col.forEach((ch,i) => {
      const a = col.alpha*(1 - i/col.col.length);
      // Hue blends toward violet (280) when suspended
      const hue = col.hue*(1-blend) + 280*blend;
      ctx.fillStyle = `hsla(${hue},80%,62%,${a*(1+blend*0.4)})`;
      ctx.fillText(ch, col.x, col.y - i*10);
    });
  }
}

function renderSectorFields(cx, cy, maxR, beat, blend) {
  if (!nlpActive) return;
  for (let i=0; i<12; i++) {
    const { hue } = NLP12[i];
    const a0 = i*(Math.PI/6) - Math.PI/12;
    // In suspended mode: hue drifts, alpha rises slightly, edges become softer
    const h = hue*(1-blend) + ((hue+120)%360)*blend;
    const aBoost = blend*0.025;
    const g = ctx.createRadialGradient(cx,cy,20, cx,cy,maxR*0.78);
    g.addColorStop(0,   `hsla(${h},100%,60%,${0.010+beat*0.018+aBoost})`);
    g.addColorStop(0.5, `hsla(${h},100%,52%,${0.022+aBoost*0.5})`);
    g.addColorStop(1,   `hsla(${h},100%,45%,0)`);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,maxR*0.78,a0,a0+Math.PI/6);
    ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
  }
}

// в”Ђв”Ђ SUSPENDED FLUID SURFACE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// A rippling liquid membrane drawn on top of the hex field when blend > 0.
// Made of multiple overlapping sine-displaced ellipses with very low alpha.
function renderFluidSurface(cx, cy, W, H, blend, st) {
  if (blend < 0.02) return;
  ctx.save();
  const layers = 5;
  for (let l=0; l<layers; l++) {
    const fi  = l/layers;
    const rx  = W*0.28 + W*0.18*Math.sin(st*0.14+fi*2.1);
    const ry  = H*0.22 + H*0.14*Math.cos(st*0.17+fi*1.7);
    const ox  = cx + Math.sin(st*0.23+fi*2.8)*W*0.08;
    const oy  = cy + Math.cos(st*0.19-fi*2.2)*H*0.07;
    const hue = 260 + l*18 + st*4;
    const a   = blend * (0.025 + l*0.008);

    ctx.beginPath();
    ctx.ellipse(ox, oy, rx, ry, st*0.05+fi*0.4, 0, Math.PI*2);
    const g = ctx.createRadialGradient(ox,oy,0, ox,oy,Math.max(rx,ry));
    g.addColorStop(0, `hsla(${hue},100%,72%,${a*1.8})`);
    g.addColorStop(0.5, `hsla(${hue+20},100%,60%,${a})`);
    g.addColorStop(1,   `hsla(${hue+40},100%,48%,0)`);
    ctx.fillStyle = g;
    ctx.fill();
  }

  // Ripple arcs emanating from center вЂ” only in suspended mode
  for (let r=0; r<6; r++) {
    const rr = (st*28 + r*55) % Math.max(W,H);
    const ra = blend * (0.06 * (1 - rr/Math.max(W,H)));
    if (ra < 0.005) continue;
    ctx.beginPath();
    ctx.arc(cx, cy, rr, 0, Math.PI*2);
    ctx.strokeStyle = `hsla(${270+r*14},90%,70%,${ra})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  ctx.restore();
}

// в”Ђв”Ђ SUSPENDED DRIFT PARTICLES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Slow-floating motes that appear when suspended вЂ” different from beat particles.
// They drift upward and fade, giving a "suspended in liquid" feel.
const driftMotes = Array.from({length:55}, () => ({
  x: Math.random()*1400,
  y: Math.random()*900,
  vy: -(0.08 + Math.random()*0.22),
  vx: (Math.random()-0.5)*0.08,
  r:  0.6 + Math.random()*2.2,
  hue: 240 + Math.random()*80,
  alpha: 0.12 + Math.random()*0.25,
  phase: Math.random()*Math.PI*2,
}));

function renderDriftMotes(W, H, blend) {
  if (blend < 0.05) return;
  for (const m of driftMotes) {
    m.y += m.vy * blend;
    m.x += m.vx * blend + Math.sin(suspendT*0.4+m.phase)*0.12*blend;
    if (m.y < -20) m.y = H+20;
    const a = m.alpha * blend;
    ctx.beginPath();
    ctx.arc(m.x % W, m.y, m.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${m.hue},90%,72%,${a})`;
    ctx.shadowBlur = 4*blend;
    ctx.shadowColor = `hsl(${m.hue},100%,70%)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function renderHexField(cx, cy, W, H, beat, blend) {
  const R  = 36;
  const gw = R*Math.sqrt(3);
  const gh = R*1.5;
  const nodes = [];

  // Which data source to use: live audio or decayed memory
  const fBuf = (isStarted && !isPaused) ? freqData : (memFreq || freqData);
  const wBuf = (isStarted && !isPaused) ? waveData  : (memWave  || waveData);

  for (let row=-1; row*gh<H+R; row++) {
    const hy0   = row*gh;
    const shift = (((row%2)+2)%2)*(gw/2);
    for (let col=-1; col*gw<W+gw; col++) {
      let hx = col*gw + shift;
      let hy = hy0;

      // Fluid displacement in suspended mode
      if (blend > 0.01) {
        const disp = fluidDisplace(hx, hy, suspendT, blend*12);
        hx += disp.dx;
        hy += disp.dy;
      }

      const dist = Math.hypot(hx-cx, hy-cy);
      const raw = isStarted ? readFreq(dist,W,H,fBuf) : idleVal(hx,hy);

      // Add fluid noise on top of audio data when suspended
      let p = Math.min(1, (raw*intensityMul)/255);
      if (blend > 0) {
        const fn = fluidNoise(hx, hy, suspendT);
        p = p*(1-blend*0.6) + fn*blend*0.5;
      }

      const sid  = nlpActive ? sectorOf(hx,hy,cx,cy) : null;
      let   hue  = sid !== null ? NLP12[sid].hue : 165+p*80;

      // Hue shifts toward amber/violet spectrum when suspended
      const suspHue = (hue + 120) % 360;
      hue = hue*(1-blend) + suspHue*blend;

      if (visualMode===2) hue = (hue + t*28*p) % 360;

      const breath = visualMode===0 ? Math.sin(t*1.6+dist*0.016)*0.08 : 0;
      // Cells breathe more slowly and deeply when suspended
      const suspBreath = blend * Math.sin(suspendT*0.8+dist*0.009)*0.18;
      const hexR = R*(0.36 + p*0.62 + breath + suspBreath);
      const light = 38 + p*26;

      ctx.beginPath();
      const rotOff = visualMode===2 ? t*0.035 : blend*suspendT*0.012;
      for (let i=0;i<6;i++) {
        const a = (Math.PI/3)*i + rotOff;
        ctx.lineTo(hx+hexR*Math.cos(a), hy+hexR*Math.sin(a));
      }
      ctx.closePath();

      if (p>0.38) {
        ctx.fillStyle=`hsla(${hue},88%,${light}%,${p*0.16})`;
        ctx.fill();
      }
      ctx.strokeStyle=`hsla(${hue},100%,${light}%,${0.10+p*0.88})`;
      ctx.lineWidth=0.5+p*4.2;
      ctx.stroke();

      if (p>0.72) {
        ctx.shadowBlur=10*p + beatEnergy*6;
        ctx.shadowColor=`hsl(${hue},100%,68%)`;
        ctx.stroke();
        ctx.shadowBlur=0;
      }

      if (p>0.78 && Math.random()<0.08) nodes.push({x:hx,y:hy,h:hue});
      if (p>0.84 && Math.random()<0.12 && !isPaused) spawnParticle(hx,hy,hue,p);
    }
  }

  // Constellation
  for (let i=0;i<nodes.length;i++) {
    for (let j=i+1;j<nodes.length;j++) {
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.hypot(dx,dy);
      if (d<120) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle=`hsla(${(nodes[i].h+nodes[j].h)*0.5},100%,65%,${0.14*(1-d/120)})`;
        ctx.lineWidth=0.7; ctx.stroke();
      }
    }
  }
}

function renderAudioOverlays(cx, cy, W, H, beat, blend) {
  const wBuf = (isStarted && !isPaused) ? waveData : (memWave || waveData);
  const fBuf = (isStarted && !isPaused) ? freqData : (memFreq || freqData);
  const alpha = 1 - blend*0.7;

  // Waveform ribbon вЂ” uses memory buffer when suspended, with gentle drift
  ctx.beginPath();
  const step = W/wBuf.length;
  ctx.moveTo(0,cy);
  for (let i=0;i<wBuf.length;i++) {
    let v = (wBuf[i]/128-1)*52*intensityMul;
    // Add slow liquid wave distortion on top when suspended
    if (blend > 0) v += Math.sin(i*0.045 + suspendT*0.8)*18*blend;
    ctx.lineTo(i*step, cy+v);
  }
  const ribbonHue = 165*(1-blend) + 280*blend;
  ctx.strokeStyle=`hsla(${ribbonHue},100%,65%,${(0.07+beat*0.14)*alpha})`;
  ctx.lineWidth=1.0+beat*0.8+blend*0.5;
  ctx.stroke();

  if (!isStarted) return;

  ctx.save();
  for (let arm=0;arm<2;arm++) {
    ctx.beginPath();
    for (let i=0;i<180;i++) {
      const fi = i/180;
      const f  = fBuf[(i*2)%fBuf.length]/255;
      // Spiral slows down significantly when suspended
      const spd = (0.32+arm*0.12)*(1-blend*0.75);
      const ang = fi*8.4 + t*spd + arm*Math.PI;
      const rad = 24 + fi*Math.min(cx,cy)*0.60 + f*22*intensityMul;
      const x   = cx+Math.cos(ang)*rad;
      const y   = cy+Math.sin(ang)*rad*0.74;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    const spiralHue = (arm===0?165:285)*(1-blend) + (arm===0?280:320)*blend;
    ctx.strokeStyle=`hsla(${spiralHue},100%,60%,${(0.10+beat*0.18)*alpha})`;
    ctx.lineWidth=0.9+beat*1.0;
    ctx.shadowBlur=8+beat*8;
    ctx.shadowColor=arm===0?'#00ffb4':'#7c5cff';
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Polar ring
  const ringR=Math.min(cx,cy)*0.38;
  ctx.beginPath();
  for (let i=0;i<fBuf.length;i+=4) {
    const f=fBuf[i]/255;
    const ang=(i/fBuf.length)*Math.PI*2-Math.PI/2;
    const r=ringR+f*28*intensityMul;
    const x=cx+Math.cos(ang)*r;
    const y=cy+Math.sin(ang)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  const ringHue = 165*(1-blend) + 280*blend;
  ctx.strokeStyle=`hsla(${ringHue},90%,62%,${(0.06+beatEnergy*0.10)*alpha})`;
  ctx.lineWidth=0.8;
  ctx.stroke();
  ctx.restore();
}

function renderVortex(cx, cy, beat, blend) {
  // Vortex slows down and shifts hue toward violet when suspended
  for (let ri=0;ri<4;ri++) {
    const baseR=44+ri*26;
    const dir=ri%2===0?1:-1;
    const speedMul = 1 - blend*0.82;
    const spd=(0.18+ri*0.05+beatEnergy*0.35)*dir*speedMul;
    const phase=t*spd;
    const segs=10+ri*4;
    const gap=0.20+ri*0.04;
    const alpha=(0.055+beatEnergy*0.18)*(1-ri*0.18);
    const hue=(165+ri*22+t*5)%360;
    const h = hue*(1-blend) + ((hue+115)%360)*blend;
    ctx.save();
    ctx.strokeStyle=`hsla(${h},100%,62%,${alpha})`;
    ctx.lineWidth=1.3-ri*0.16;
    ctx.shadowBlur=6+beatEnergy*8;
    ctx.shadowColor=`hsl(${h},100%,62%)`;
    for (let s=0;s<segs;s++) {
      const a0=(s/segs)*Math.PI*2+phase;
      const a1=a0+(Math.PI*2/segs)*(1-gap);
      ctx.beginPath(); ctx.arc(cx,cy,baseR,a0,a1); ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.restore();
  }
}

function renderPulseRings(cx, cy) {
  for (const r of rings) {
    r.r+=5.5; r.a*=0.962;
    const lw=Math.max(0.3,r.w*(1-r.r/500));
    ctx.beginPath(); ctx.arc(cx,cy,r.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,255,180,${r.a})`;
    ctx.lineWidth=lw; ctx.stroke();
  }
  for (let i=rings.length-1;i>=0;i--)
    if(rings[i].a<0.022||rings[i].r>480) rings.splice(i,1);
}

function renderParticles() {
  for (const p of parts) {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.974; p.vy*=0.974; p.life--;
    const a=Math.max(0,p.life/p.max);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},100%,70%,${a*0.72})`;
    ctx.shadowBlur=6; ctx.shadowColor=`hsl(${p.hue},100%,68%)`;
    ctx.fill(); ctx.shadowBlur=0;
  }
  for (let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
}

function renderSectorLabels(cx, cy, maxR, beat, blend) {
  if (!nlpActive) return;
  ctx.save();
  for (let i=0;i<12;i++) {
    const { hue, label }=NLP12[i];
    const ang=(Math.PI/6)*i;
    const h = hue*(1-blend) + ((hue+120)%360)*blend;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+maxR*Math.cos(ang), cy+maxR*Math.sin(ang));
    ctx.strokeStyle=`hsla(${h},75%,52%,${0.045+beatEnergy*0.045})`;
    ctx.lineWidth=0.9; ctx.stroke();
    const mid=ang+Math.PI/12;
    const lr=148+16*Math.sin(t*0.75+i);
    ctx.fillStyle=`hsla(${h},82%,64%,${0.42+beatEnergy*0.25})`;
    ctx.font='bold 8px Share Tech Mono,Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label, cx+lr*Math.cos(mid), cy+lr*Math.sin(mid));
  }
  ctx.restore();
}

function renderOmega(cx, cy, beat, blend) {
  const scale=1+beatEnergy*0.55;
  const alpha=0.16+0.12*Math.sin(t*1.1)+beatEnergy*0.28;
  // In suspended mode: omega pulses slowly at a violet frequency
  const suspAlpha = 0.22 + 0.18*Math.sin(suspendT*0.6);
  const fa = alpha*(1-blend) + suspAlpha*blend;
  const omegaHue = blend > 0 ? 270 : -1; // -1 = teal default
  ctx.save();
  ctx.translate(cx,cy); ctx.scale(scale,scale);
  ctx.font=`bold ${18+beat*7}px Share Tech Mono,Courier New`;
  if (omegaHue >= 0) {
    ctx.fillStyle=`hsla(${omegaHue},90%,72%,${fa})`;
    ctx.shadowColor=`hsl(${omegaHue},100%,72%)`;
  } else {
    ctx.fillStyle=`rgba(0,255,180,${fa})`;
    ctx.shadowColor='#00ffb4';
  }
  ctx.shadowBlur=14+beatEnergy*22+blend*18;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('О©',0,0);
  ctx.shadowBlur=0; ctx.restore();
}

function renderRadar(cx, cy, maxR, blend) {
  const ang=t*0.65*(1-blend*0.88)%(Math.PI*2);
  const aLen=maxR*0.52;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,aLen,ang-0.50,ang); ctx.closePath();
  const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,aLen);
  rg.addColorStop(0,'rgba(0,255,180,0)');
  rg.addColorStop(0.7,`rgba(0,255,180,${0.022+beatEnergy*0.045})`);
  rg.addColorStop(1,'rgba(0,255,180,0)');
  ctx.fillStyle=rg; ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+aLen*Math.cos(ang),cy+aLen*Math.sin(ang));
  ctx.strokeStyle=`rgba(0,255,180,${0.14+beatEnergy*0.18})`;
  ctx.lineWidth=1.2; ctx.stroke();
  ctx.restore();
}

function renderSpectrumStrip(W, beat) {
  if (!isStarted || isPaused) return;
  const N=48, gap=2;
  const bw=(W*0.55-gap*(N-1))/N;
  const ox=W*0.225;
  for (let i=0;i<N;i++) {
    const v=freqData[Math.floor(i*(freqData.length/N))]/255;
    const h=5+v*38*intensityMul;
    const hue=165+i*3.1;
    ctx.fillStyle=`hsla(${hue},100%,56%,${0.10+v*0.65})`;
    ctx.fillRect(ox+i*(bw+gap), 8+(38-h), bw, h);
  }
}

// Suspended-mode spectrum: shows decayed memory as a ghost strip
function renderSuspendedStrip(W, blend) {
  if (blend < 0.05 || !memFreq) return;
  const N=48, gap=2;
  const bw=(W*0.55-gap*(N-1))/N;
  const ox=W*0.225;
  for (let i=0;i<N;i++) {
    const v=memFreq[Math.floor(i*(memFreq.length/N))]/255;
    const h=5+v*38*intensityMul;
    const hue=260+i*1.8;
    ctx.fillStyle=`hsla(${hue},100%,62%,${(0.06+v*0.38)*blend})`;
    ctx.fillRect(ox+i*(bw+gap), 8+(38-h), bw, h);
  }
}

function renderScanLines(W, H, beat) {
  if (beat<0.20) return;
  const n=3+Math.floor(beat*5);
  for (let i=0;i<n;i++) {
    const y=((t*180+i*(H/n))%(H+60))-30;
    ctx.fillStyle=`rgba(0,255,180,${0.013*beat})`;
    ctx.fillRect(0,y,W,1.5);
  }
}

function renderHUD(W, H, blend) {
  ctx.save();
  ctx.font='8px Share Tech Mono,Courier New';
  const label = blend > 0.5 ? 'SUSPENDED' : MODES[visualMode];
  const color = blend > 0.5
    ? `hsla(270,90%,72%,${0.14+blend*0.14})`
    : `rgba(0,255,180,${0.10+beatEnergy*0.10})`;
  ctx.fillStyle=color;
  ctx.textAlign='left';
  ctx.fillText(
    `LOOP_CYCLE В· NLP:${nlpActive?'ACTIVE':'OFF'} В· MODE:${label} В· E:${(beatEnergy*100).toFixed(0)}% В· t:${t.toFixed(1)}`,
    14, H-14
  );
  ctx.restore();
}

// в”Ђв”Ђ MAIN RENDER LOOP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function draw() {
  requestAnimationFrame(draw);
  t += 0.011;

  // Smooth mouse
  mouse.x += (mouseTgt.x-mouse.x)*0.06;
  mouse.y += (mouseTgt.y-mouse.y)*0.06;

  // Smooth suspend blend (transitions in ~0.8s each way)
  const blendTarget = isPaused ? 1 : 0;
  suspendLerp += (blendTarget - suspendLerp) * 0.025;
  const blend = suspendLerp;

  // Advance suspended time counter (slower clock)
  if (blend > 0.01) {
    suspendT += 0.008 * blend;
    decayMemory();
  }

  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  const maxR=Math.max(W,H)*1.20;

  if (isStarted && !isPaused) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(waveData);
  }
  processBeat();
  const beat = beatImpact;

  // Background вЂ” shifts to deeper indigo-black when suspended
  const bgAlpha = visualMode===0 ? 0.16 : visualMode===1 ? 1.0 : 0.40;
  const bgR = Math.round(0*(1-blend) + 6*blend);
  const bgG = Math.round(2*(1-blend) + 0*blend);
  const bgB = Math.round(6*(1-blend) + 18*blend);
  ctx.fillStyle = `rgba(${bgR},${bgG},${bgB},${bgAlpha})`;
  ctx.fillRect(0,0,W,H);

  renderGlyphRain(W,H,blend);
  renderSectorFields(cx,cy,maxR,beat,blend);

  const tiltX=(mouse.y-0.5)*0.045;
  const tiltY=(mouse.x-0.5)*0.045;
  ctx.save();
  ctx.translate(cx,cy); ctx.transform(1,tiltX,tiltY,1,0,0); ctx.translate(-cx,-cy);

  renderRadar(cx,cy,maxR,blend);
  renderHexField(cx,cy,W,H,beat,blend);
  renderAudioOverlays(cx,cy,W,H,beat,blend);

  ctx.restore();

  // Fluid surface on top of hex, below UI layers
  renderFluidSurface(cx,cy,W,H,blend,suspendT);
  renderDriftMotes(W,H,blend);

  renderSectorLabels(cx,cy,maxR,beat,blend);
  renderVortex(cx,cy,beat,blend);
  renderPulseRings(cx,cy);
  renderParticles();
  renderOmega(cx,cy,beat,blend);

  renderSpectrumStrip(W,beat);
  renderSuspendedStrip(W,blend);
  renderScanLines(W,H,beat);
  renderHUD(W,H,blend);
}

draw();
</script>
