<!DOCTYPE html>
<html lang="cs">
<head>
    <title>Lex Forensica | HEX-NLP Manifold v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Share Tech Mono','Courier New',monospace; }
        canvas { display: block; position: absolute; inset: 0; }
        .ui { position: relative; z-index: 10; pointer-events: none; }
        .interact { pointer-events: auto; }
        .glass {
            background: rgba(0,4,12,0.80);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0,255,180,0.10);
        }
        .glow-text { text-shadow: 0 0 14px rgba(0,255,180,0.55); }
        .axiom-pulse { animation: axiomPulse 3.2s ease-in-out infinite; }
        @keyframes axiomPulse { 0%,100%{opacity:0.30} 50%{opacity:0.85} }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,180,0.25); }
        .btn {
            border: 1px solid rgba(0,255,180,0.35);
            background: rgba(0,255,180,0.04);
            color: #00ffb4;
            padding: 8px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 0.10em;
            transition: all 0.18s;
            text-transform: uppercase;
        }
        .btn:hover  { background: rgba(0,255,180,0.12); border-color: rgba(0,255,180,0.75); box-shadow: 0 0 14px rgba(0,255,180,0.18); }
        .btn.active { background: rgba(0,255,180,0.18); border-color: #00ffb4; box-shadow: 0 0 18px rgba(0,255,180,0.30); }
        .status-dot {
            width:6px; height:6px; border-radius:50%;
            background:#00ffb4; box-shadow:0 0 8px #00ffb4;
            display:inline-block;
            animation: blink 1.6s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
        .status-dot.idle { background:#223; box-shadow:none; animation:none; }
        .status-dot.warn { background:#f90; box-shadow:0 0 8px #f90; }
        .back-link {
            position:fixed; top:20px; left:20px; z-index:200;
            font-family:'Share Tech Mono',monospace;
            font-size:8px; letter-spacing:3px;
            color:rgba(0,229,255,0.25);
            text-decoration:none; text-transform:uppercase;
            transition:color 0.3s; pointer-events:auto;
        }
        .back-link:hover { color:#00e5ff; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<a href="index.html" class="back-link">← Lex Forensica</a>

<div class="ui h-screen w-full flex flex-col items-end justify-between p-5">

    <!-- TOP RIGHT: NLP LEGEND -->
    <div class="glass interact p-4 rounded-lg w-56">
        <div class="text-[9px] tracking-widest text-emerald-400 mb-2 opacity-50 uppercase">HEX-NLP · 12 Planes</div>
        <div id="nlp-legend" class="grid grid-cols-2 gap-y-1 gap-x-2"></div>
    </div>

    <!-- BOTTOM RIGHT: CONTROL PANEL -->
    <div class="glass interact p-5 rounded-lg w-64 flex flex-col gap-3">
        <div class="text-center border-b border-emerald-500/20 pb-3">
            <div class="glow-text text-emerald-300 text-base font-bold tracking-[0.3em]">LEX FORENSICA</div>
            <div class="text-[8px] text-emerald-500/40 tracking-widest mt-0.5">INTERACTIVE MANIFOLD · v14</div>
        </div>
        <div class="text-[8px] text-emerald-400/55 leading-relaxed axiom-pulse border border-emerald-500/10 rounded p-2">
            <div id="axiomDisplay">A0 · Pipeline integrity verified</div>
        </div>
        <label class="btn block text-center cursor-pointer">
            <span id="fileLabel">↑ UPLOAD AUDIO SOURCE</span>
            <input type="file" id="aud" class="hidden" accept="audio/*">
        </label>
        <button id="play" class="btn font-bold text-sm py-3 tracking-widest">INITIALIZE SYSTEM</button>
        <div class="flex gap-2">
            <button id="toggleNLP"  class="btn flex-1 active">NLP: ON</button>
            <button id="toggleMode" class="btn flex-1">FLUID</button>
        </div>
        <div class="flex flex-col gap-1">
            <div class="text-[8px] text-emerald-500/40 tracking-widest">SIGNAL INTENSITY</div>
            <input type="range" id="intensity" min="0.1" max="3" step="0.05" value="1"
                style="accent-color:#00ffb4;width:100%;cursor:pointer;">
        </div>
        <div class="flex items-center gap-2 pt-1 border-t border-emerald-500/10">
            <span class="status-dot idle" id="statusDot"></span>
            <span class="text-[8px] text-emerald-400/45 tracking-tight uppercase" id="status">System Idle · Waiting Target</span>
        </div>
        <div class="text-[7px] text-emerald-600/25 text-center tracking-widest">
            Ω · DIGNITY > PROCESS > INSTITUTION · ZK-ACTIVE
        </div>
    </div>
</div>

<script>
/* =============================================================
   HEX-NLP MANIFOLD v14
   Design principle: every layer has a defined alpha budget.
   Idle state is organic. Audio state is reactive, not noisy.
   5 render layers, each serving a distinct perceptual role.
   ============================================================= */

// ── NLP 12-PLANE TAXONOMY ────────────────────────────────
const NLP12 = [
  { id:0,  label:'ASSERT⁺', hue:165 }, { id:1,  label:'ASSERT⁻', hue:180 },
  { id:2,  label:'DIRECT⁺', hue:195 }, { id:3,  label:'DIRECT⁻', hue:210 },
  { id:4,  label:'COMMIT⁺', hue:255 }, { id:5,  label:'COMMIT⁻', hue:275 },
  { id:6,  label:'EXPR⁺',   hue:300 }, { id:7,  label:'EXPR⁻',   hue:325 },
  { id:8,  label:'DECL⁺',   hue:15  }, { id:9,  label:'DECL⁻',   hue:35  },
  { id:10, label:'META⁺',   hue:55  }, { id:11, label:'META⁻',   hue:75  },
];

const AXIOMS = [
  'A0 · Pipeline integrity verified','A1 · Axiom validation active',
  'A2 · LOOP_CYCLE verifikace','A3 · Zero-Knowledge šifrování ✓',
  'A4 · Narativ chráněn · Ω','A5 · Forenzní přesnost: ON',
  'A6 · Důstojnost > Proces','A7 · ECHR/CRPD/GDPR layer',
  'A8 · Financial forensic active','A9 · Control Room synced',
  'A10 · Visual network aligned','A11 · META signal detected',
  'A12 · NLP_DRIFT: monitoring','A13 · LOOP_CYCLE →100%',
];

// Build legend
const legendEl = document.getElementById('nlp-legend');
NLP12.forEach(n => {
  const d = document.createElement('div');
  d.className = 'text-[8px] truncate';
  d.style.color = `hsl(${n.hue},88%,60%)`;
  d.innerHTML = `<span style="opacity:.35">[${n.id}]</span> ${n.label}`;
  legendEl.appendChild(d);
});

let axiomIdx = 0;
setInterval(() => {
  axiomIdx = (axiomIdx + 1) % AXIOMS.length;
  document.getElementById('axiomDisplay').textContent = AXIOMS[axiomIdx];
}, 2800);

// ── AUDIO ENGINE ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const audio  = new Audio();

let aCtx, analyser, freqData, waveData;
let isStarted   = false;
let nlpActive   = true;
let visualMode  = 0;          // 0=FLUID 1=STATIC 2=DEEP
let intensityMul = 1.0;
const MODES = ['FLUID','STATIC','DEEP'];

function setStatus(msg, type='active') {
  document.getElementById('status').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (type==='idle'?' idle':type==='warn'?' warn':'');
}

function initAudio() {
  if (aCtx) return;
  aCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = aCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.80;
  const src = aCtx.createMediaElementSource(audio);
  src.connect(analyser); analyser.connect(aCtx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  waveData = new Uint8Array(analyser.frequencyBinCount);
  isStarted = true;
  setStatus('Manifold Active · NLP12 Engaged');
}

document.getElementById('aud').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  audio.src = URL.createObjectURL(f);
  document.getElementById('fileLabel').textContent = '♪ ' + f.name.slice(0,22);
  setStatus('SRC: ' + f.name.slice(0,20));
};
document.getElementById('play').onclick = () => {
  initAudio();
  if (aCtx.state === 'suspended') aCtx.resume();
  if (audio.paused) {
    audio.play();
    document.getElementById('play').textContent = 'PAUSE SIGNAL';
    setStatus('Signal streaming · NLP active');
  } else {
    audio.pause();
    document.getElementById('play').textContent = 'RESUME SIGNAL';
    setStatus('Signal paused', 'warn');
  }
};
document.getElementById('toggleNLP').onclick = function() {
  nlpActive = !nlpActive;
  this.textContent = nlpActive ? 'NLP: ON' : 'NLP: OFF';
  this.classList.toggle('active', nlpActive);
};
document.getElementById('toggleMode').onclick = function() {
  visualMode = (visualMode + 1) % 3;
  this.textContent = MODES[visualMode];
};
document.getElementById('intensity').oninput = function() {
  intensityMul = parseFloat(this.value);
};

// ── GLOBAL STATE ─────────────────────────────────────────
let t = 0;

// Mouse (smooth-lerped)
const mouse    = { x: 0.5, y: 0.5 };
const mouseTgt = { x: 0.5, y: 0.5 };
window.addEventListener('pointermove', e => {
  mouseTgt.x = e.clientX / window.innerWidth;
  mouseTgt.y = e.clientY / window.innerHeight;
});

// Beat
let beatEnergy   = 0;   // 0–1 smoothed energy
let beatHold     = 0;
let beatBaseline = 0;
let beatImpact   = 0;   // single-frame transient

// Particles  (budget: 600 max)
const PART_MAX = 600;
const parts = [];

// Pulse rings  (budget: 8 max)
const rings = [];

// Idle field seeds
const seeds = Array.from({length:6}, () => ({
  ox: Math.random()*900, oy: Math.random()*600,
  freq: 0.25 + Math.random()*0.5,
  phase: Math.random()*Math.PI*2,
}));

// Glyph rain  (28 columns, very low alpha — background texture only)
const GLYPHS = 'ASSERT+ASSERT-DIRECT+DIRECT-COMMIT+COMMIT-EXPR+EXPR-DECL+DECL-META+META-ΩZK→≠≡∞';
const RAIN_N = 26;
const rain = Array.from({length:RAIN_N}, (_,i) => ({
  x: 0, y: -Math.random()*600,
  speed: 0.45 + Math.random()*1.1,
  hue: NLP12[i % 12].hue,
  col: Array.from({length:10}, () => GLYPHS[Math.floor(Math.random()*GLYPHS.length)]),
  alpha: 0.025 + Math.random()*0.045,  // hard cap — stays in background
}));

// ── HELPERS ──────────────────────────────────────────────

function idleVal(x, y) {
  let v = 0;
  for (const s of seeds) {
    const d = Math.hypot(x-s.ox, y-s.oy);
    v += Math.sin(d*0.011 - t*s.freq + s.phase)*0.5 + 0.5;
  }
  return Math.min(255, (v/seeds.length)*72 + 14);
}

function sectorOf(x, y, cx, cy) {
  const a = Math.atan2(y-cy, x-cx);
  return Math.floor(((a*180/Math.PI)+360)%360/30);
}

function readFreq(dist, W, H) {
  const fi = Math.floor((dist/(Math.max(W,H)*0.72))*(freqData.length/2)) % (freqData.length/2);
  return freqData[fi];
}

// ── BEAT DETECTION ───────────────────────────────────────
// Uses sub-bass bin average vs. adaptive baseline.
// beatEnergy: 0–1 smoothed;  beatImpact: 0–1 single-frame spike.
function processBeat() {
  beatImpact = 0;
  if (!isStarted) return;
  let low = 0;
  const N = Math.min(20, freqData.length);
  for (let i = 0; i < N; i++) low += freqData[i];
  low /= N;

  beatBaseline = beatBaseline*0.93 + low*0.07;
  const delta  = Math.max(0, low - beatBaseline);
  beatImpact   = delta > 14 ? Math.min(1, delta/80) : 0;

  if (beatImpact > 0.08 && beatHold <= 0) {
    beatHold = 10;
    if (rings.length < 8)
      rings.push({ r:12, a: 0.55 + beatImpact*0.35, w: 1.2 + beatImpact*5 });
  } else { beatHold--; }

  beatEnergy = beatEnergy*0.88 + beatImpact*0.38;
}

// ── PARTICLE HELPERS ─────────────────────────────────────
function spawnParticle(x, y, hue, power) {
  if (parts.length >= PART_MAX) return;
  const spd = 0.6 + power*2.4;
  const ang = Math.random()*Math.PI*2;
  parts.push({
    x, y,
    vx: Math.cos(ang)*spd*(0.5+Math.random()),
    vy: Math.sin(ang)*spd*(0.5+Math.random()),
    life: 30 + Math.random()*40,
    max:  70,
    r:    0.6 + Math.random()*1.8 + power,
    hue,
  });
}

// ── LAYER RENDERERS ──────────────────────────────────────

/* L0 — Glyph rain: NLP-label chars, deep background texture.
   Alpha budget: max 0.07 per char — never competes with hex field. */
function renderGlyphRain(W, H) {
  const cw = W / RAIN_N;
  ctx.font = '7px Share Tech Mono,Courier New';
  ctx.textAlign = 'center';
  for (const col of rain) {
    col.x = (rain.indexOf(col)+0.5)*cw;
    col.y += col.speed;
    if (col.y > H+180) { col.y = -60-Math.random()*300; col.speed = 0.4+Math.random()*1.2; }
    col.col.forEach((ch,i) => {
      const a = col.alpha*(1 - i/col.col.length);
      ctx.fillStyle = `hsla(${col.hue},80%,62%,${a})`;
      ctx.fillText(ch, col.x, col.y - i*10);
    });
  }
}

/* L1 — Sector fields: radial gradient washes per NLP wedge.
   Alpha budget: 0.01–0.04 base, +0.02 on beat peak.
   Role: classify space, not illuminate it. */
function renderSectorFields(cx, cy, maxR, beat) {
  if (!nlpActive) return;
  for (let i = 0; i < 12; i++) {
    const { hue } = NLP12[i];
    const a0 = i*(Math.PI/6) - Math.PI/12;
    const g = ctx.createRadialGradient(cx,cy,20, cx,cy,maxR*0.78);
    g.addColorStop(0,   `hsla(${hue},100%,60%,${0.010+beat*0.018})`);
    g.addColorStop(0.5, `hsla(${hue},100%,52%,0.022)`);
    g.addColorStop(1,   `hsla(${hue},100%,45%,0)`);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,maxR*0.78,a0,a0+Math.PI/6);
    ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
  }
}

/* L2 — Hex field: the primary visual layer.
   Each cell maps to a freq bin by radial distance.
   Size, brightness, and stroke weight encode energy.
   Constellation links drawn inline (no extra pass needed). */
function renderHexField(cx, cy, W, H, beat) {
  const R  = 36;
  const gw = R*Math.sqrt(3);
  const gh = R*1.5;
  const nodes = [];   // peak nodes for constellation

  for (let row = -1; row*gh < H+R; row++) {
    const hy0   = row*gh;
    const shift = (((row%2)+2)%2)*(gw/2);
    for (let col = -1; col*gw < W+gw; col++) {
      const hx   = col*gw + shift;
      const hy   = hy0;
      const dist = Math.hypot(hx-cx, hy-cy);

      const raw = isStarted ? readFreq(dist,W,H) : idleVal(hx,hy);
      const p   = Math.min(1, (raw*intensityMul)/255);

      const sid    = nlpActive ? sectorOf(hx,hy,cx,cy) : null;
      let   hue    = sid !== null ? NLP12[sid].hue : 165+p*80;
      if (visualMode===2) hue = (hue + t*28*p) % 360;

      const breath = visualMode===0 ? Math.sin(t*1.6+dist*0.016)*0.08 : 0;
      const hexR   = R*(0.36 + p*0.62 + breath);
      const light  = 38 + p*26;

      // Draw hex
      ctx.beginPath();
      const rotOff = visualMode===2 ? t*0.035 : 0;
      for (let i=0;i<6;i++) {
        const a = (Math.PI/3)*i + rotOff;
        ctx.lineTo(hx+hexR*Math.cos(a), hy+hexR*Math.sin(a));
      }
      ctx.closePath();

      if (p > 0.38) {
        ctx.fillStyle = `hsla(${hue},88%,${light}%,${p*0.16})`;
        ctx.fill();
      }
      ctx.strokeStyle = `hsla(${hue},100%,${light}%,${0.10+p*0.88})`;
      ctx.lineWidth   = 0.5 + p*4.2;
      ctx.stroke();

      if (p > 0.72) {
        ctx.shadowBlur  = 10*p + beatEnergy*6;
        ctx.shadowColor = `hsl(${hue},100%,68%)`;
        ctx.stroke();
        ctx.shadowBlur  = 0;
      }

      // Constellation node collection (sampled sparsely)
      if (p > 0.78 && Math.random() < 0.08) nodes.push({x:hx,y:hy,h:hue});
      // Particle emission (only on strong signal)
      if (p > 0.84 && Math.random() < 0.12) spawnParticle(hx,hy,hue,p);
    }
  }

  // Constellation: connect nearby peak nodes with hairlines
  // Alpha capped at 0.15 — decorative, not dominant
  for (let i=0;i<nodes.length;i++) {
    for (let j=i+1;j<nodes.length;j++) {
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.hypot(dx,dy);
      if (d<120) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle=`hsla(${(nodes[i].h+nodes[j].h)*0.5},100%,65%,${0.14*(1-d/120)})`;
        ctx.lineWidth=0.7; ctx.stroke();
      }
    }
  }
}

/* L3 — Mid-layer audio overlays:
   a) Waveform ribbon — single horizontal trace
   b) Spiral arms — 2 rotating polar frequency curves
   c) Radial frequency ring — polar freq plot at fixed radius
   These share a combined alpha budget so they don't stack into noise. */
function renderAudioOverlays(cx, cy, W, H, beat) {
  // Waveform ribbon
  if (isStarted) {
    ctx.beginPath();
    const step = W/waveData.length;
    ctx.moveTo(0,cy);
    for (let i=0;i<waveData.length;i++) {
      ctx.lineTo(i*step, cy + (waveData[i]/128-1)*52*intensityMul);
    }
    ctx.strokeStyle = `rgba(0,255,180,${0.07+beat*0.14})`;
    ctx.lineWidth = 1.0+beat*0.8;
    ctx.stroke();
  }

  // Spiral arms — only when audio active
  if (!isStarted) return;
  ctx.save();
  for (let arm=0;arm<2;arm++) {
    ctx.beginPath();
    for (let i=0;i<180;i++) {
      const fi  = i/180;
      const f   = freqData[(i*2)%freqData.length]/255;
      const ang = fi*8.4 + t*(0.32+arm*0.12) + arm*Math.PI;
      const rad = 24 + fi*Math.min(cx,cy)*0.60 + f*22*intensityMul;
      const x   = cx+Math.cos(ang)*rad;
      const y   = cy+Math.sin(ang)*rad*0.74;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle = `hsla(${arm===0?165:285},100%,60%,${0.10+beat*0.18})`;
    ctx.lineWidth   = 0.9+beat*1.0;
    ctx.shadowBlur  = 8+beat*8;
    ctx.shadowColor = arm===0?'#00ffb4':'#7c5cff';
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Polar frequency ring — maps full spectrum to a circle
  const ringR = Math.min(cx,cy)*0.38;
  ctx.beginPath();
  for (let i=0;i<freqData.length;i+=4) {
    const f   = freqData[i]/255;
    const ang = (i/freqData.length)*Math.PI*2 - Math.PI/2;
    const r   = ringR + f*28*intensityMul;
    const x   = cx+Math.cos(ang)*r;
    const y   = cy+Math.sin(ang)*r;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(0,255,180,${0.06+beatEnergy*0.10})`;
  ctx.lineWidth   = 0.8;
  ctx.stroke();
  ctx.restore();
}

/* L4 — Foreground: vortex rings, pulse rings, particles, sector labels.
   This layer is always in front — clean, legible, responsive. */

function renderVortex(cx, cy, beat) {
  // 4 segmented rings — alternating rotation, hue drift
  for (let ri=0;ri<4;ri++) {
    const baseR = 44 + ri*26;
    const dir   = ri%2===0 ? 1 : -1;
    const spd   = (0.18+ri*0.05+beatEnergy*0.35)*dir;
    const phase = t*spd;
    const segs  = 10+ri*4;
    const gap   = 0.20+ri*0.04;
    const alpha = (0.055+beatEnergy*0.18)*(1-ri*0.18);
    const hue   = (165+ri*22+t*5)%360;

    ctx.save();
    ctx.strokeStyle = `hsla(${hue},100%,62%,${alpha})`;
    ctx.lineWidth   = 1.3-ri*0.16;
    ctx.shadowBlur  = 6+beatEnergy*8;
    ctx.shadowColor = `hsl(${hue},100%,62%)`;
    for (let s=0;s<segs;s++) {
      const a0=(s/segs)*Math.PI*2+phase;
      const a1=a0+(Math.PI*2/segs)*(1-gap);
      ctx.beginPath(); ctx.arc(cx,cy,baseR,a0,a1); ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.restore();
  }
}

function renderPulseRings(cx, cy) {
  for (const r of rings) {
    r.r += 5.5; r.a *= 0.962;
    const lw = Math.max(0.3, r.w*(1-r.r/500));
    ctx.beginPath();
    ctx.arc(cx,cy,r.r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,180,${r.a})`;
    ctx.lineWidth   = lw;
    ctx.stroke();
  }
  for (let i=rings.length-1;i>=0;i--)
    if (rings[i].a<0.022||rings[i].r>480) rings.splice(i,1);
}

function renderParticles() {
  for (const p of parts) {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.974; p.vy*=0.974; p.life--;
    const a=Math.max(0,p.life/p.max);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);
    ctx.fillStyle   = `hsla(${p.hue},100%,70%,${a*0.72})`;
    ctx.shadowBlur  = 6;
    ctx.shadowColor = `hsl(${p.hue},100%,68%)`;
    ctx.fill();
    ctx.shadowBlur=0;
  }
  for (let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
}

function renderSectorLabels(cx, cy, maxR, beat) {
  if (!nlpActive) return;
  ctx.save();
  for (let i=0;i<12;i++) {
    const { hue, label } = NLP12[i];
    const ang = (Math.PI/6)*i;

    // Sector divider
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+maxR*Math.cos(ang), cy+maxR*Math.sin(ang));
    ctx.strokeStyle = `hsla(${hue},75%,52%,${0.045+beatEnergy*0.045})`;
    ctx.lineWidth=0.9; ctx.stroke();

    // Label — floats gently
    const mid = ang+Math.PI/12;
    const lr  = 148+16*Math.sin(t*0.75+i);
    ctx.fillStyle    = `hsla(${hue},82%,64%,${0.42+beatEnergy*0.25})`;
    ctx.font         = 'bold 8px Share Tech Mono,Courier New';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, cx+lr*Math.cos(mid), cy+lr*Math.sin(mid));
  }
  ctx.restore();
}

/* Omega mark — center anchor, scales with beat, always visible */
function renderOmega(cx, cy, beat) {
  const scale = 1 + beatEnergy*0.55;
  const alpha = 0.16 + 0.12*Math.sin(t*1.1) + beatEnergy*0.28;
  ctx.save();
  ctx.translate(cx,cy); ctx.scale(scale,scale);
  ctx.font         = `bold ${18+beat*7}px Share Tech Mono,Courier New`;
  ctx.fillStyle    = `rgba(0,255,180,${alpha})`;
  ctx.textAlign    = 'center'; ctx.textBaseline='middle';
  ctx.shadowBlur   = 14+beatEnergy*22;
  ctx.shadowColor  = '#00ffb4';
  ctx.fillText('Ω',0,0);
  ctx.shadowBlur=0; ctx.restore();
}

/* Radar sweep — single slow arm, adds spatial scanning feel.
   Low alpha — context, not emphasis. */
function renderRadar(cx, cy, maxR) {
  const ang  = t*0.65 % (Math.PI*2);
  const aLen = maxR*0.52;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,aLen,ang-0.50,ang); ctx.closePath();
  const rg = ctx.createRadialGradient(cx,cy,0,cx,cy,aLen);
  rg.addColorStop(0,  'rgba(0,255,180,0)');
  rg.addColorStop(0.7,`rgba(0,255,180,${0.022+beatEnergy*0.045})`);
  rg.addColorStop(1,  'rgba(0,255,180,0)');
  ctx.fillStyle=rg; ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+aLen*Math.cos(ang), cy+aLen*Math.sin(ang));
  ctx.strokeStyle=`rgba(0,255,180,${0.14+beatEnergy*0.18})`;
  ctx.lineWidth=1.2; ctx.stroke();
  ctx.restore();
}

/* Spectrum strip — thin top bar, freq-colored.
   Stays in canvas corners so it doesn't conflict with UI panels. */
function renderSpectrumStrip(W, beat) {
  if (!isStarted) return;
  const N=48, gap=2;
  const bw=(W*0.55-gap*(N-1))/N;
  const ox=W*0.225;
  for (let i=0;i<N;i++) {
    const v  = freqData[Math.floor(i*(freqData.length/N))]/255;
    const h  = 5+v*38*intensityMul;
    const hue= 165+i*3.1;
    ctx.fillStyle=`hsla(${hue},100%,56%,${0.10+v*0.65})`;
    ctx.fillRect(ox+i*(bw+gap), 8+(38-h), bw, h);
  }
}

/* Scan lines — only on strong beat transients, never constant.
   Max alpha 0.025 — felt rather than seen. */
function renderScanLines(W, H, beat) {
  if (beat < 0.20) return;
  const n = 3+Math.floor(beat*5);
  for (let i=0;i<n;i++) {
    const y=((t*180+i*(H/n))%(H+60))-30;
    ctx.fillStyle=`rgba(0,255,180,${0.013*beat})`;
    ctx.fillRect(0,y,W,1.5);
  }
}

/* HUD footer — single line, variable brightness with energy */
function renderHUD(W, H) {
  ctx.save();
  ctx.font='8px Share Tech Mono,Courier New';
  ctx.fillStyle=`rgba(0,255,180,${0.10+beatEnergy*0.10})`;
  ctx.textAlign='left';
  ctx.fillText(
    `LOOP_CYCLE · NLP:${nlpActive?'ACTIVE':'OFF'} · MODE:${MODES[visualMode]} · E:${(beatEnergy*100).toFixed(0)}% · P:${parts.length} · t:${t.toFixed(1)}`,
    14, H-14
  );
  ctx.restore();
}

// ── MAIN RENDER LOOP ─────────────────────────────────────
function draw() {
  requestAnimationFrame(draw);
  t += 0.011;

  // Smooth mouse
  mouse.x += (mouseTgt.x - mouse.x)*0.06;
  mouse.y += (mouseTgt.y - mouse.y)*0.06;

  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  const maxR=Math.max(W,H)*1.20;

  // Read audio
  if (isStarted) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(waveData);
  }
  processBeat();
  const beat = beatImpact;

  // ── Background ──
  // Persistence amount by mode (FLUID keeps trails, STATIC clears)
  const bgAlpha = visualMode===0 ? 0.16 : visualMode===1 ? 1.0 : 0.40;
  ctx.fillStyle = `rgba(0,2,6,${bgAlpha})`;
  ctx.fillRect(0,0,W,H);

  // ── Layer 0 — Glyph rain (background texture) ──
  renderGlyphRain(W,H);

  // ── Layer 1 — Sector field washes ──
  renderSectorFields(cx,cy,maxR,beat);

  // ── Layer 2 — Mouse parallax tilt (applied to hex + overlays only) ──
  const tiltX=(mouse.y-0.5)*0.045;
  const tiltY=(mouse.x-0.5)*0.045;
  ctx.save();
  ctx.translate(cx,cy); ctx.transform(1,tiltX,tiltY,1,0,0); ctx.translate(-cx,-cy);

  renderRadar(cx,cy,maxR);
  renderHexField(cx,cy,W,H,beat);
  renderAudioOverlays(cx,cy,W,H,beat);

  ctx.restore(); // end tilt

  // ── Layer 3 — Sector labels & dividers (not tilted — stay legible) ──
  renderSectorLabels(cx,cy,maxR,beat);

  // ── Layer 4 — Foreground reactive elements ──
  renderVortex(cx,cy,beat);
  renderPulseRings(cx,cy);
  renderParticles();
  renderOmega(cx,cy,beat);

  // ── HUD overlays (non-tilted, always on top) ──
  renderSpectrumStrip(W,beat);
  renderScanLines(W,H,beat);
  renderHUD(W,H);
}

draw();
</script>
</body>
