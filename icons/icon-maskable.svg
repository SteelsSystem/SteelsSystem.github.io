<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lex Manifold">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#07111a"/>
      <stop offset="100%" stop-color="#03070b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="55%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (maskable: entire 512x512 is background) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Foreground constrained to ~80% safe zone (center ~256, radius ~104) -->
  <g transform="translate(256 256)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <g opacity="0.35" stroke="#00e5ff" stroke-width="2">
      <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" transform="scale(0.85)"/>
      <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" transform="scale(0.55)"/>
    </g>
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             stroke="url(#ring)" stroke-width="8"/>
    <g stroke="#00e5ff" stroke-width="3" opacity="0.7">
      <line x1="0" y1="-120" x2="0" y2="120"/>
      <line x1="-104" y1="-60" x2="104" y2="60"/>
      <line x1="-104" y1="60" x2="104" y2="-60"/>
    </g>
    <circle r="18" fill="#ffb300"/>
    <circle r="8" fill="#fff"/>
  </g>
</svg>
