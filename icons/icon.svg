<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lex Manifold">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#07111a"/>
      <stop offset="100%" stop-color="#03070b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="55%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <g transform="translate(256 256)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <g opacity="0.35" stroke="#00e5ff" stroke-width="2">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" transform="scale(1.05)"/>
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" transform="scale(0.78)"/>
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" transform="scale(0.52)"/>
    </g>
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"
             stroke="url(#ring)" stroke-width="10" filter="url(#glow)" opacity="0.85"/>
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"
             stroke="url(#ring)" stroke-width="6"/>
    <g stroke="#00e5ff" stroke-width="3" opacity="0.7">
      <line x1="0" y1="-180" x2="0" y2="180"/>
      <line x1="-156" y1="-90" x2="156" y2="90"/>
      <line x1="-156" y1="90" x2="156" y2="-90"/>
    </g>
    <circle r="22" fill="#ffb300" filter="url(#glow)"/>
    <circle r="10" fill="#fff"/>
  </g>
  <text x="256" y="470" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="40" font-weight="700" fill="#00e5ff" opacity="0.85"
        letter-spacing="6">LEX</text>
</svg>
